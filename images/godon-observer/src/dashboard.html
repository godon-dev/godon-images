<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>godon observer</title>
<script>
if(location.protocol==='file:'){
  document.write('<script src="https://d3js.org/d3.v7.min.js"><\/script>');
  document.write('<script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"><\/script>');
} else {
  document.write('<script src="/d3.js"><\/script>');
  document.write('<script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"><\/script>');
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code','Consolas',monospace;background:#0d1117;color:#c9d1d9;font-size:13px}
header{background:#161b22;border-bottom:1px solid #30363d;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;color:#e6edf3}header h1 span{color:#3fb950}
.bar{background:#161b22;border-bottom:1px solid #30363d;padding:8px 20px;display:flex;align-items:center;gap:12px}
.bar label{color:#8b949e;min-width:50px}
.bar input[type="text"]{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:3px 8px;border-radius:3px;font-family:inherit;width:280px}
.bar button{background:#238636;color:#fff;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;font-family:inherit}
.bar button:hover{background:#2ea043}
nav{background:#161b22;border-bottom:1px solid #30363d;padding:0 20px;display:flex}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:#8b949e;padding:8px 14px;cursor:pointer;font-family:inherit;font-size:12px}
nav button.active{color:#e6edf3;border-bottom-color:#3fb950}
nav button:hover{color:#c9d1d9}
.content{padding:16px 20px;overflow-y:auto;height:calc(100vh - 120px)}
.legend{display:flex;gap:16px;margin-bottom:10px;font-size:11px}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:2px}
.slider-row{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:12px;color:#8b949e}
.slider-row input[type="range"]{flex:1;position:relative;height:8px;-webkit-appearance:none;appearance:none;background:transparent}
.slider-row input[type="range"]::-webkit-slider-runnable-track{background:#21262d;height:8px;border-radius:4px}
.slider-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:4px;height:14px;background:#e6edf3;border-radius:2px;margin-top:-3px}
.slider-row input[type="range"]::-moz-range-track{background:#21262d;height:8px;border-radius:4px}
.slider-row input[type="range"]::-moz-range-thumb{width:4px;height:14px;background:#e6edf3;border-radius:2px;border:none}
.slider-row input[type="range"].quality-track::-webkit-slider-runnable-track{background:transparent}
.slider-row input[type="range"].quality-track::-moz-range-track{background:transparent}
.slider-row .trial-info{color:#e6edf3;min-width:180px}
.summary{background:#161b22;border-bottom:1px solid #30363d;padding:6px 20px;font-size:12px;color:#8b949e;display:none}
.summary span{margin-right:20px}
.summary .v{color:#e6edf3}
.summary .violation{color:#f85149}
.summary .best{color:#3fb950}
.chart-wrap{overflow-x:auto;padding-bottom:8px}
.tooltip{position:fixed;background:#1c2128;border:1px solid #30363d;border-radius:6px;padding:8px 12px;font-size:11px;pointer-events:none;z-index:100;max-width:300px;display:none}
.error{background:#2a1a1a;border:1px solid #da3633;border-radius:4px;padding:8px;color:#f85149;margin:8px 0}
.info{background:#1a2a1a;border:1px solid #238636;border-radius:4px;padding:8px;color:#3fb950;margin:8px 0}
.status{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #30363d;padding:4px 20px;font-size:10px;color:#8b949e;display:flex;justify-content:space-between}
.hm-cell{cursor:pointer}
.hm-cell:hover{stroke:#fff;stroke-width:2}
.pc-line{fill:none;cursor:pointer}
.pc-line:hover{stroke-width:3!important;opacity:1!important}
.sp-line{fill:none;stroke-linejoin:round}
.ov-list{list-style:none;padding:0;margin:0}
.ov-row{display:flex;align-items:center;gap:16px;padding:10px 24px;border-bottom:1px solid #21262d;cursor:pointer;transition:background 0.15s}
.ov-row:hover{background:#161b22}
.ov-row:hover .ov-name{color:#e6edf3}
.ov-row.selected{background:#1c2128;border-left:3px solid #3fb950;padding-left:21px}
.ov-name{flex:1;font-size:13px;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:120px}
.ov-trials{width:60px;text-align:right;font-size:12px;color:#8b949e;flex-shrink:0}
.ov-created{width:130px;text-align:right;font-size:11px;color:#6e7681;flex-shrink:0}
.ov-loading{text-align:center;padding:40px;color:#6e7681;font-size:12px}
.ov-cross-bar{display:none;align-items:center;gap:12px;padding:8px 24px;background:#161b22;border-bottom:1px solid #30363d}
.ov-cross-bar.show{display:flex}
.ov-cross-btn{background:#238636;color:#fff;border:none;padding:5px 14px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:12px}
.ov-cross-btn:hover{background:#2ea043}
.ov-cross-btn:disabled{background:#21262d;color:#484f58;cursor:default}
.ov-cross-count{font-size:11px;color:#8b949e}
.ov-cross-clear{background:none;border:none;color:#6e7681;cursor:pointer;font-family:inherit;font-size:11px}
.ov-cross-clear:hover{color:#c9d1d9}
.ov-header{display:flex;align-items:center;gap:16px;padding:8px 24px;border-bottom:1px solid #30363d;background:#0d1117}
.ov-header button{background:none;border:none;color:#6e7681;cursor:pointer;font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:0}
.ov-header button:hover{color:#c9d1d9}
.ov-header button .sort-arrow{margin-left:4px;font-size:9px}
.ov-header .ov-h-name{flex:1;min-width:120px;text-align:left}
.ov-header .ov-h-trials{width:60px;text-align:right}
.ov-header .ov-h-created{width:130px;text-align:right}
.back-btn{background:none;border:none;color:#3fb950;cursor:pointer;font-family:inherit;font-size:13px;padding:0 8px}
.back-btn:hover{text-decoration:underline}
.cross-tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid #30363d}
.cross-tabs button{background:none;border:none;color:#6e7681;cursor:pointer;font-family:inherit;font-size:12px;padding:6px 14px;border-bottom:2px solid transparent}
.cross-tabs button:hover{color:#c9d1d9}
.cross-tabs button.active{color:#e6edf3;border-bottom-color:#3fb950}
.cross-ranked-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-bottom:1px solid #21262d;cursor:pointer;transition:background .1s}
.cross-ranked-row:hover{background:#161b22}
.cross-ranked-header{display:flex;align-items:center;gap:10px;padding:5px 10px;border-bottom:1px solid #30363d;font-size:10px;color:#6e7681;cursor:pointer;user-select:none}
.cross-ranked-header:hover{color:#c9d1d9}
.cross-ranked-header.sorted{color:#c9d1d9}
.cross-pair-detail{display:none;padding:16px 0;border-top:1px solid #21262d;margin-top:16px}
.cross-pair-detail.show{display:block}
.cross-method-row{display:flex;align-items:center;gap:10px;padding:3px 0;font-size:10px;color:#6e7681}
.cross-m-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cross-m-dot.on{background:#3fb950}
.cross-m-dot.off{background:#30363d}
.cross-m-bar{flex:1;height:3px;background:#21262d;border-radius:1.5px;max-width:120px;overflow:hidden}
.cross-tree-card{border:1px solid #21262d;border-radius:6px;padding:10px 12px;background:#0d1117}
.cross-tree-node{display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer}
.cross-tree-node:hover{background:#161b22}
.cross-tree-children{padding-left:18px;border-left:1px solid #21262d;margin-left:8px}
.cross-close-btn{background:none;border:none;color:#6e7681;cursor:pointer;font-family:inherit;font-size:11px;padding:0}
.cross-close-btn:hover{color:#c9d1d9}
</style>
</head>
<body>
<header><h1>godon <span>observer</span></h1><span id="clock" style="font-size:11px;color:#8b949e"></span></header>
<div class="bar" id="bar">
<button class="back-btn" id="backBtn" style="display:none">&#8592; overview</button>
<label>breeder:</label><input type="text" id="breederId" placeholder="paste breeder UUID">
<button id="loadBtn">load</button>
<span id="loadStatus" style="color:#8b949e;font-size:11px"></span>
</div>
<nav id="nav">
<button class="active" data-view="heatmap">heatmap</button>
<button data-view="spider">spider web</button>
<button data-view="parallel">parallel coordinates</button>
<button data-view="convergence">convergence</button>
<button data-view="trajectory">trajectory</button>
<button data-view="heartbeat">heartbeat</button>
<button data-view="guardrails">guardrails</button>
</nav>
<div class="summary" id="summary"></div>
<div class="content" id="content"></div>
<div class="tooltip" id="tooltip"></div>
<div class="status"><span id="statusL">ready</span><span id="statusR"></span></div>
<script>
const $=id=>document.getElementById(id);
let breederConfig=null,trials=[],currentView='heatmap',baseUrl='',refreshTimer=null;
let lastMode='active',obsTrialCount=0,activeTrialCount=0;

const DEMO=!window.location.protocol.startsWith('http');
function status(m){$('statusL').textContent=m}

const DEMO_CONFIG={objectives:[
  {name:'growth_rate',direction:'maximize'},
  {name:'energy_kwh',direction:'minimize'},
  {name:'water_liters',direction:'minimize'}
],guardrails:[
  {name:'max_temp',hard_limit:40},
  {name:'max_humidity',hard_limit:0.9},
  {name:'max_co2',hard_limit:1500}
]};
const DEMO_TRIALS=(function(){
  const params=['co2_injection','heating_setpoints','irrigation','light_intensity','shading','vent_openings'];
  const out=[];
  const choreoId='demo-choreo-001';
  for(let i=0;i<100;i++){
    const isObs=i>=20&&i<25||i>=26&&i<31;
    const p=isObs?{}:(() => {const o={};params.forEach(k=>{o[k]=+(Math.random()*10).toFixed(2)});return o})();
    const h=Math.floor(i/6),m=i%6;
    const max_temp=+(33+Math.random()*12).toFixed(1);
    const max_humidity=+(0.78+Math.random()*0.2).toFixed(3);
    const max_co2=+(1000+Math.random()*700).toFixed(0);
    const attrs=isObs?{phase:'observe_only',choreography_id:choreoId,choreography_phase_idx:i>=26?5:2}:{};
    if(!isObs) attrs.guardrails=JSON.stringify({max_temp:{value:max_temp,hard_limit:40,violated:max_temp>40},max_humidity:{value:max_humidity,hard_limit:0.9,violated:max_humidity>0.9},max_co2:{value:+max_co2,hard_limit:1500,violated:+max_co2>1500}});
    out.push({
      number:i,state:'COMPLETE',
      datetime_start:'2026-04-17 '+(20+h).toString().padStart(2,'0')+':'+m+'0:00',
      params:p,
      values:[+(0.1+Math.random()*0.5).toFixed(4),+(Math.random()*50).toFixed(4),+(Math.random()*15).toFixed(4)],
      user_attrs:attrs
    });
  }
  return out;
})();

const DEMO_BREEDERS=[
  {id:'b8c9d0e1-f2a3-4567-bcde-678901234567',name:'network-tuner',total_trials:156,createdAt:'2026-04-18T11:00:00Z'},
  {id:'a1b2c3d4-e5f6-7890-abcd-ef1234567890',name:'bench-s3-gh1',total_trials:47,createdAt:'2026-04-20T08:12:00Z'},
  {id:'b2c3d4e5-f6a7-8901-bcde-f12345678901',name:'bench-s3-gh2',total_trials:43,createdAt:'2026-04-20T08:12:30Z'},
  {id:'c3d4e5f6-a7b8-9012-cdef-123456789012',name:'bench-s4-gh1',total_trials:31,createdAt:'2026-04-21T14:30:00Z'},
  {id:'d4e5f6a7-b8c9-0123-defa-234567890123',name:'bench-s4-gh2',total_trials:28,createdAt:'2026-04-21T14:30:15Z'},
  {id:'e5f6a7b8-c9d0-1234-efab-345678901234',name:'linux-perf-01',total_trials:12,createdAt:'2026-04-22T09:05:00Z'},
  {id:'a7b8c9d0-e1f2-3456-abcd-567890123456',name:'greenhouse-beta',total_trials:5,createdAt:'2026-04-22T10:15:00Z'},
  {id:'f6a7b8c9-d0e1-2345-fabc-456789012345',name:'greenhouse-alpha',total_trials:0,createdAt:'2026-04-22T10:00:00Z'},
];

const DEMO_CHOREOGRAPHY={
  choreographies:[{
    id:'demo-choreo-001',
    participants:['a1b2c3d4-e5f6-7890-abcd-ef1234567890','b2c3d4e5-f6a7-8901-bcde-f12345678901'],
    current_phase:3,total_phases:6,phase_label:'recovery',observe_breeder:null,
    status:'running',
    phases:[
      {observe_breeder:null,label:'baseline'},
      {observe_breeder:'a1b2c3d4-e5f6-7890-abcd-ef1234567890',label:'observe'},
      {observe_breeder:null,label:'recovery'},
      {observe_breeder:null,label:'baseline'},
      {observe_breeder:'b2c3d4e5-f6a7-8901-bcde-f12345678901',label:'observe'},
      {observe_breeder:null,label:'recovery'}
    ],
    created_at:'2026-04-20 08:15:00',updated_at:'2026-04-20 09:30:00'
  },{
    id:'demo-choreo-002',
    participants:['c3d4e5f6-a7b8-9012-cdef-123456789012','d4e5f6a7-b8c9-0123-defa-234567890123'],
    current_phase:1,total_phases:6,phase_label:'observe',observe_breeder:'c3d4e5f6-a7b8-9012-cdef-123456789012',
    status:'running',
    phases:[
      {observe_breeder:null,label:'baseline'},
      {observe_breeder:'c3d4e5f6-a7b8-9012-cdef-123456789012',label:'observe'},
      {observe_breeder:null,label:'recovery'},
      {observe_breeder:null,label:'baseline'},
      {observe_breeder:'d4e5f6a7-b8c9-0123-defa-234567890123',label:'observe'},
      {observe_breeder:null,label:'recovery'}
    ],
    created_at:'2026-04-21 14:35:00',updated_at:'2026-04-21 15:10:00'
  }],
  active_breeders:[
    {breeder_id:'a1b2c3d4-e5f6-7890-abcd-ef1234567890',last_seen:'2026-04-20 09:30:00'},
    {breeder_id:'b2c3d4e5-f6a7-8901-bcde-f12345678901',last_seen:'2026-04-20 09:30:00'},
    {breeder_id:'c3d4e5f6-a7b8-9012-cdef-123456789012',last_seen:'2026-04-21 15:10:00'},
    {breeder_id:'d4e5f6a7-b8c9-0123-defa-234567890123',last_seen:'2026-04-21 15:10:00'},
  ]
};

let overviewMode=true;
let selectedBreeders=[];
let lastClickedIdx=-1;
let sortField='name';
let sortDir=1;
let choreographyData=null;

function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-CA')+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function sortedBreeders(breeders){
  return [...breeders].sort((a,b)=>{
    let va,vb;
    if(sortField==='name'){va=a.name.toLowerCase();vb=b.name.toLowerCase();return va<vb?-sortDir:va>vb?sortDir:0}
    if(sortField==='trials'){va=a.total_trials||0;vb=b.total_trials||0}
    if(sortField==='created'){va=new Date(a.createdAt||0).getTime();vb=new Date(b.createdAt||0).getTime()}
    return (va-vb)*sortDir;
  });
}

function breederChoreography(breederId){
  if(!choreographyData||!choreographyData.choreographies) return null;
  return choreographyData.choreographies.find(c=>c.status==='running'&&c.participants.includes(breederId))||null;
}

async function loadChoreography(){
  if(DEMO){choreographyData=DEMO_CHOREOGRAPHY;return}
  try{choreographyData=await api('/api/choreography')}catch(e){choreographyData=null}
}

function updateCrossBar(){
  const bar=$('crossBar');
  const btn=$('crossBtn');
  const count=$('crossCount');
  if(selectedBreeders.length>0){
    bar.classList.add('show');
    btn.disabled=selectedBreeders.length<2;
    count.textContent=selectedBreeders.length+' selected';
  } else {
    bar.classList.remove('show');
  }
  document.querySelectorAll('.ov-row').forEach(row=>{
    const id=row.dataset.id;
    if(selectedBreeders.includes(id)) row.classList.add('selected');
    else row.classList.remove('selected');
  });
}

function toggleSelect(id,idx){
  const pos=selectedBreeders.indexOf(id);
  if(pos>=0) selectedBreeders.splice(pos,1);
  else selectedBreeders.push(id);
  lastClickedIdx=idx;
  updateCrossBar();
}

function rangeSelect(id,idx){
  if(lastClickedIdx<0||lastClickedIdx>=currentBreeders.length){
    toggleSelect(id,idx);
    return;
  }
  const start=Math.min(lastClickedIdx,idx);
  const end=Math.max(lastClickedIdx,idx);
  for(let i=start;i<=end;i++){
    const bid=currentBreeders[i].id;
    if(!selectedBreeders.includes(bid)) selectedBreeders.push(bid);
  }
  updateCrossBar();
}

function clearSelection(){
  selectedBreeders=[];
  lastClickedIdx=-1;
  updateCrossBar();
}

function showOverview(){
  overviewMode=true;
  $('nav').style.display='none';
  $('summary').style.display='none';
  $('backBtn').style.display='none';
  $('bar').querySelector('label').style.display='none';
  $('breederId').style.display='none';
  $('loadBtn').style.display='none';
  $('loadStatus').textContent='';
  if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}
  breederConfig=null;trials=[];
  loadOverview();
}

function showDetail(){
  overviewMode=false;
  $('nav').style.display='flex';
  $('backBtn').style.display='inline';
  $('bar').querySelector('label').style.display='';
  $('breederId').style.display='';
  $('loadBtn').style.display='';
}

async function loadOverview(){
  const el=$('content');
  if(DEMO){
    await loadChoreography();
    renderOverview(DEMO_BREEDERS);
    status('demo mode — '+DEMO_BREEDERS.length+' breeders');
    return;
  }
  baseUrl=window.location.origin;
  el.innerHTML='<div class="ov-loading">loading breeders...</div>';
  try{
    const breeders=await api('/api/breeders');
    await loadChoreography();
    renderOverview(breeders);
    status(breeders.length+' breeders');
  }catch(e){
    el.innerHTML='<div class="error">'+e.message+'</div>';
    status('error: '+e.message);
  }
}

let currentBreeders=[];

function renderOverview(breeders){
  currentBreeders=breeders;
  const el=d3.select('#content');
  el.html('');
  if(!breeders.length){
    el.append('div').attr('class','info').text('no breeders found');
    return;
  }

  const crossBar=el.append('div').attr('class','ov-cross-bar').attr('id','crossBar');
  crossBar.append('button').attr('class','ov-cross-btn').attr('id','crossBtn')
    .attr('disabled',true).text('cross').on('click',()=>crossBreeders(selectedBreeders));
  crossBar.append('span').attr('class','ov-cross-count').attr('id','crossCount').text('');
  crossBar.append('button').attr('class','ov-cross-clear').text('clear').on('click',clearSelection);

  const arrow=f=>sortField===f?(sortDir===1?'\u25b2':'\u25bc'):'';
  const hdr=el.append('div').attr('class','ov-header');
  hdr.append('button').attr('class','ov-h-name').html('name <span class="sort-arrow">'+arrow('name')+'</span>')
    .on('click',()=>{sortField='name';if(sortField==='name')sortDir=-sortDir;else sortDir=1;renderOverview(currentBreeders)});
  hdr.append('button').style('width','140px').style('text-align','left').style('color','#6e7681').style('font-size','10px').text('choreography');
  hdr.append('button').attr('class','ov-h-trials').html('trials <span class="sort-arrow">'+arrow('trials')+'</span>')
    .on('click',()=>{sortField='trials';if(sortField==='trials')sortDir=-sortDir;else sortDir=1;renderOverview(currentBreeders)});
  hdr.append('button').attr('class','ov-h-created').html('created <span class="sort-arrow">'+arrow('created')+'</span>')
    .on('click',()=>{sortField==='created';if(sortField==='created')sortDir=-sortDir;else sortDir=1;renderOverview(currentBreeders)});

  const ordered=sortedBreeders(breeders);
  const list=el.append('ul').attr('class','ov-list');
  ordered.forEach((b,idx)=>{
    const li=list.append('li').attr('class','ov-row')
      .attr('data-id',b.id)
      .attr('data-idx',idx);

    if(selectedBreeders.includes(b.id)) li.classed('selected',true);

    li.append('div').attr('class','ov-name').text(b.name);

    const ch=breederChoreography(b.id);
    if(ch){
      const isObserving=ch.observe_breeder===b.id;
      const badge=li.append('div').style('display','flex').style('align-items','center').style('gap','4px').style('flex-shrink','0');
      badge.append('span').style('width','6px').style('height','6px').style('border-radius','50%')
        .style('background',isObserving?'#58a6ff':'#3fb950').style('flex-shrink','0');
      badge.append('span').style('font','9px monospace').style('color',isObserving?'#58a6ff':'#3fb950')
        .text(ch.current_phase+'/'+ch.total_phases+' '+ch.phase_label+(isObserving?' (observing)':''));
    } else {
      li.append('div').style('width','60px').style('flex-shrink','0');
    }

    li.append('div').attr('class','ov-trials').text(b.total_trials||'—');
    li.append('div').attr('class','ov-created').text(b.createdAt?fmtDate(b.createdAt):'');

    li.on('click',function(event){
      event.preventDefault();
      if(event.shiftKey){
        rangeSelect(b.id,idx);
      } else if(event.ctrlKey||event.metaKey){
        toggleSelect(b.id,idx);
      } else {
        if(selectedBreeders.length>0){
          clearSelection();
          return;
        }
        $('breederId').value=b.id;
        showDetail();
        loadBreeder();
      }
    });
  });
  updateCrossBar();
}

async function loadCrossData(ids){
  const el=d3.select('#content');
  el.html('<div class="ov-loading">loading trials for '+ids.length+' breeders...</div>');
  try{
    const breeders=[];
    for(const id of ids){
      let config,trialList;
      if(DEMO){
        const match=DEMO_BREEDERS.find(b=>b.id===id);
        config={name:match?match.name:id,...DEMO_CONFIG};
        trialList=null;
      } else {
        config=await api('/api-proxy/breeders/'+id);
        if(config.config) Object.keys(config.config).forEach(k=>{if(!config[k])config[k]=config.config[k]});
        const studies=await api('/api/breeders/'+id+'/studies');
        if(!studies.studies||!studies.studies.length) continue;
        const studyName=studies.studies[0].study_name;
        let all=[],offset=0;
        while(true){
          const batch=await api('/api/breeders/'+id+'/trials/'+encodeURIComponent(studyName)+'?offset='+offset+'&limit=500');
          all=all.concat(batch.trials);
          if(batch.trials.length<500) break;
          offset+=500;
        }
        trialList=all.filter(t=>t.state==='COMPLETE');
        trialList.sort((a,b)=>a.datetime_start<b.datetime_start?-1:1);
        if(studies.studies[0].directions){
          config._directions=studies.studies[0].directions;
          if(config.objectives) config.objectives.forEach((obj,i)=>{
            if(config._directions[i]) obj.direction=config._directions[i].toLowerCase();
          });
        }
      }
      const qualities=trialList?trialList.map(t=>{
        if(!config.objectives||!config.objectives.length) return Math.random();
        let sum=0,cnt=0;
        config.objectives.forEach((_,i)=>{
          const v=t.values?t.values[i]:null;
          if(v!==null&&v!==undefined){
            const vals=trialList.map(tt=>tt.values?tt.values[i]:null).filter(x=>x!==null);
            const mn=d3.min(vals),mx=d3.max(vals),rng=mx-mn||1;
            const norm=(v-mn)/rng;
            sum+=(config._directions&&config._directions[i]==='MINIMIZE')?1-norm:norm;
            cnt++;
          }
        });
        return cnt?sum/cnt:0;
      }):[];
      const times=trialList?trialList.map(t=>new Date(t.datetime_start).getTime()/1000):[];
      breeders.push({
        id,name:config.name||id,config,
        trials:trialList||[],qualities,times,
        trialCount:trialList?trialList.length:0
      });
    }
    if(breeders.length<2){
      el.html('<div class="error">need at least 2 breeders with trials for cross-examination</div>');
      return;
    }
    if(DEMO){
      const n=50;
      const baseTime=new Date('2026-04-20T08:00:00').getTime()/1000;
      const baseQ=breeders.map(()=>0.3+Math.random()*0.4);
      const couples=[[0,1],[2,3],[4,5]];
      const allQ=breeders.map(()=>[]);
      const allT=breeders.map(()=>[]);
      for(let t=0;t<n;t++){
        const time=baseTime+t*900+Math.random()*200;
        for(let b=0;b<breeders.length;b++){
          let q=allQ[b].length?allQ[b][allQ[b].length-1]:baseQ[b];
          q+=(0.6-q)*0.1+0.08*(Math.random()-0.5);
          const couple=couples.find(c=>c[1]===b);
          if(couple&&t>0){
            const prevQ=allQ[couple[0]][t-1];
            const pprevQ=t>1?allQ[couple[0]][t-2]:prevQ;
            q+=(prevQ-pprevQ)*0.6;
          }
          q=Math.max(0,Math.min(1,q));
          allQ[b].push(q);
          allT[b].push(time);
        }
      }
      breeders.forEach((b,idx)=>{
        b.qualities=allQ[idx];
        b.times=allT[idx];
        b.trials=allQ[idx].map((q,i)=>({number:i,state:'COMPLETE',datetime_start:new Date(allT[idx][i]*1000).toISOString(),params:{},values:[q],user_attrs:{}}));
        b.trialCount=b.trials.length;
      });
      const choreoId='demo-cross-choreo-001';
      couples.forEach(([ai,bi])=>{
        if(bi>=breeders.length) return;
        for(let i=15;i<22;i++){
          if(breeders[bi].trials[i]){
            breeders[bi].trials[i].user_attrs={phase:'observe_only',choreography_id:choreoId,choreography_phase_idx:2};
            breeders[bi].trials[i].values[0]=Math.min(1,breeders[bi].trials[i].values[0]*1.35);
          }
        }
        for(let i=35;i<42;i++){
          if(breeders[ai].trials[i]){
            breeders[ai].trials[i].user_attrs={phase:'observe_only',choreography_id:choreoId,choreography_phase_idx:5};
            breeders[ai].trials[i].values[0]=Math.min(1,breeders[ai].trials[i].values[0]*1.25);
          }
        }
      });
      breeders.forEach(b=>{
        b.qualities=b.trials.map(t=>t.values[0]);
      });
    }
    crossData=breeders;
    status('cross-examining '+breeders.length+' breeders');
    renderCross();
  }catch(e){
    el.html('<div class="error">'+e.message+'</div>');
    status('error: '+e.message);
  }
}

function crossQ(t){
  if(breederConfig) return trialQuality(t);
  if(t.values&&t.values[0]!=null) return Math.max(0,Math.min(1,t.values[0]));
  return 0;
}

function crossRunAnalysis(){
  const results={pairs:[],overall:{high:0,medium:0,low:0}};

  for(let i=0;i<crossData.length;i++){
    for(let j=i+1;j<crossData.length;j++){
      const a=crossData[i],b=crossData[j];
      const pair={a:a.name,b:b.name,idxA:i,idxB:j,methods:[],tier:'low',sigCount:0};

      const aObsTrials=a.trials.filter(t=>t.user_attrs&&t.user_attrs.phase==='observe_only');
      const bObsTrials=b.trials.filter(t=>t.user_attrs&&t.user_attrs.phase==='observe_only');

      if(aObsTrials.length>=3&&bObsTrials.length>=3){
        const aObsPhases=[...new Set(aObsTrials.map(t=>t.user_attrs.choreography_phase_idx))];
        const bObsPhases=[...new Set(bObsTrials.map(t=>t.user_attrs.choreography_phase_idx))];

        const bDuringAPause=b.trials.filter(t=>{
          if(!t.user_attrs||!t.user_attrs.choreography_phase_idx) return false;
          return aObsPhases.includes(t.user_attrs.choreography_phase_idx);
        });
        const bOutsideAPause=b.trials.filter(t=>{
          if(!t.user_attrs) return true;
          if(t.user_attrs.phase==='observe_only') return false;
          return !aObsPhases.includes(t.user_attrs.choreography_phase_idx);
        });

        const aDuringBPause=a.trials.filter(t=>{
          if(!t.user_attrs||!t.user_attrs.choreography_phase_idx) return false;
          return bObsPhases.includes(t.user_attrs.choreography_phase_idx);
        });
        const aOutsideBPause=a.trials.filter(t=>{
          if(!t.user_attrs) return true;
          if(t.user_attrs.phase==='observe_only') return false;
          return !bObsPhases.includes(t.user_attrs.choreography_phase_idx);
        });

        const bDuringQ=bDuringAPause.map(t=>crossQ(t)).filter(q=>q!=null&&isFinite(q));
        const bOutsideQ=bOutsideAPause.map(t=>crossQ(t)).filter(q=>q!=null&&isFinite(q));
        const aDuringQ=aDuringBPause.map(t=>crossQ(t)).filter(q=>q!=null&&isFinite(q));
        const aOutsideQ=aOutsideBPause.map(t=>crossQ(t)).filter(q=>q!=null&&isFinite(q));

        const shiftAtoB=(bDuringQ.length>=3&&bOutsideQ.length>=3)?computeShift(bDuringQ,bOutsideQ):null;
        const shiftBtoA=(aDuringQ.length>=3&&aOutsideQ.length>=3)?computeShift(aDuringQ,aOutsideQ):null;

        pair.methods=[];
        if(shiftAtoB!==null){
          pair.methods.push({name:'A paused \u2192 B shift',value:shiftAtoB.shift,signal:shiftAtoB.signal});
        } else {
          pair.methods.push({name:'A paused \u2192 B shift',value:0,signal:false});
        }
        if(shiftBtoA!==null){
          pair.methods.push({name:'B paused \u2192 A shift',value:shiftBtoA.shift,signal:shiftBtoA.signal});
        } else {
          pair.methods.push({name:'B paused \u2192 A shift',value:0,signal:false});
        }

        pair.sigCount=pair.methods.filter(m=>m.signal).length;
        pair.shiftA=shiftAtoB?shiftAtoB.shift:0;
        pair.shiftB=shiftBtoA?shiftBtoA.shift:0;
        pair.maxShift=Math.max(pair.shiftA,pair.shiftB);
        pair.aActMean=aOutsideQ.length?d3.median(aOutsideQ):0;
        pair.aObsMean=aDuringQ.length?d3.median(aDuringQ):0;
        pair.bActMean=bOutsideQ.length?d3.median(bOutsideQ):0;
        pair.bObsMean=bDuringQ.length?d3.median(bDuringQ):0;
        pair.aObsCount=aObsTrials.length;
        pair.bObsCount=bObsTrials.length;
        pair.bDuringCount=bDuringQ.length;
        pair.bOutsideCount=bOutsideQ.length;
        pair.aDuringCount=aDuringQ.length;
        pair.aOutsideCount=aOutsideQ.length;

        if(pair.maxShift>=0.3&&pair.sigCount>0) pair.tier='high';
        else if(pair.maxShift>=0.1&&pair.sigCount>0) pair.tier='medium';
        pair.hasChoreography=true;
      } else {
        pair.methods=[{name:'insufficient data (need 3+ observe trials each)',value:0,signal:false}];
        pair.hasChoreography=aObsTrials.length>0||bObsTrials.length>0;
      }

      results.pairs.push(pair);
      results.overall[pair.tier]++;
    }
  }
  return results;
}

function computeShift(duringQ,outsideQ){
  const medDuring=d3.median(duringQ);
  const medOutside=d3.median(outsideQ);
  const madOutside=d3.median(outsideQ.map(v=>Math.abs(v-medOutside)));
  const scale=madOutside>0?madOutside:(d3.max(outsideQ)-d3.min(outsideQ))||1;
  const shift=Math.abs(medDuring-medOutside)/scale;
  const signal=shift>0.5;
  return{shift,signal,medDuring,medOutside,scale};
}

function renderCross(){
  if(!crossData||crossData.length<2) return;
  const el=d3.select('#content');
  el.html('');

  const hdr=el.append('div').style('display','flex').style('align-items','center').style('gap','8px').style('margin-bottom','8px');
  crossData.forEach((b,i)=>{
    if(i>0) hdr.append('span').style('color','#484f58').style('font-size','11px').text('\u00d7');
    hdr.append('span').style('background','#1c2128').style('border','1px solid #30363d').style('border-radius','4px')
      .style('padding','4px 10px').style('font-size','11px').style('color','#3fb950').text(b.name+' ('+b.trialCount+')');
  });

  const analysis=crossRunAnalysis();

  const hasAnyChoreography=analysis.pairs.some(p=>p.hasChoreography);

  const tabs=el.append('div').attr('class','cross-tabs');
  tabs.append('button').classed('active',crossView==='ranked').text('ranked').on('click',()=>{crossView='ranked';renderCross()});
  tabs.append('button').classed('active',crossView==='matrix').text('matrix').on('click',()=>{crossView='matrix';renderCross()});
  tabs.append('button').classed('active',crossView==='causality').text('causality').on('click',()=>{crossView='causality';renderCross()});
  tabs.append('button').classed('active',crossView==='aba').text('ABA').on('click',()=>{crossView='aba';renderCross()});

  if(!hasAnyChoreography){
    el.append('div').attr('class','info').style('margin-bottom','8px').text('no interference choreography data yet — choreography initiates automatically when breeders detect each other.');
  } else {
    const choreoPhases=[];
    crossData.forEach(b=>{
      b.trials.forEach(t=>{
        if(t.user_attrs&&t.user_attrs.choreography_phase_idx!=null){
          const idx=t.user_attrs.choreography_phase_idx;
          if(!choreoPhases[idx]) choreoPhases[idx]={trials:0,observeOnly:0};
          choreoPhases[idx].trials++;
          if(t.user_attrs.phase==='observe_only') choreoPhases[idx].observeOnly++;
        }
      });
    });
    const phaseSum=el.append('div').style('margin-bottom','10px').style('font-size','10px').style('color','#6e7681');
    const phaseInfo=choreoPhases.filter(Boolean).map((p,i)=>'phase '+i+': '+p.trials+' trials ('+p.observeOnly+' observe-only)').join(' | ');
    phaseSum.text(choreoPhases.filter(Boolean).length+' choreography phases | '+phaseInfo);

    const leg=el.append('div').attr('class','legend').style('margin-bottom','8px');
    leg.append('span').html('<div class="dot" style="background:#3fb950"></div>strong');
    leg.append('span').html('<div class="dot" style="background:#d29922"></div>moderate');
    leg.append('span').html('<div class="dot" style="background:#58a6ff"></div>weak');

    const sum=el.append('div').style('margin-bottom','10px').style('font-size','10px').style('color','#6e7681');
    sum.text(analysis.pairs.length+' pairs: '+analysis.overall.high+' strong, '+analysis.overall.medium+' moderate, '+analysis.overall.low+' weak');
  }

  if(crossView==='ranked') renderCrossRanked(el,analysis);
  else if(crossView==='matrix') renderCrossMatrix(el,analysis);
  else if(crossView==='aba') renderCrossABA(el,analysis);
  else renderCrossCausality(el,analysis);

  el.append('div').attr('class','cross-pair-detail').attr('id','crossPairDetail');
}

function renderCrossRanked(el,analysis){
  const ranked=analysis.pairs.map(pair=>{
    const bestDir=pair.hasChoreography?(pair.shiftB>=pair.shiftA?pair.a+'\u2192'+pair.b:pair.b+'\u2192'+pair.a):'\u2014';
    return{pair,score:pair.hasChoreography?pair.maxShift:0,bestDir};
  }).sort((a,b)=>b.score-a.score);
  const maxScore=d3.max(ranked,d=>d.score)||1;

  const cols=[
    {key:'#',w:'30px',field:null},
    {key:'pair',w:'200px',field:'name'},
    {key:'magnitude',w:'160px',field:'score'},
    {key:'certainty',w:'60px',field:'tier'},
    {key:'direction',w:'140px',field:'dir'},
    {key:'detail',w:'120px',field:null},
  ];

  const hdr=el.append('div').attr('class','cross-ranked-header');
  cols.forEach(col=>{
    const h=hdr.append('span').style('width',col.w).style('flex-shrink','0').style('overflow','hidden');
    if(col.field===crossSort) h.attr('class','cross-ranked-header sorted');
    h.text(col.key);
    if(col.field===crossSort) h.append('span').style('margin-left','3px').style('font-size','8px').text(crossSortDir===-1?'\u25BC':'\u25B2');
    if(col.field){
      h.on('click',()=>{
        if(crossSort===col.field)crossSortDir*=-1;
        else{crossSort=col.field;crossSortDir=-1}
        renderCross();
      });
    }
  });

  function doSort(items){
    return items.slice().sort((a,b)=>{
      if(crossSort==='name') return crossSortDir*(a.pair.a+' '+a.pair.b).localeCompare(b.pair.a+' '+b.pair.b);
      if(crossSort==='score') return crossSortDir*(a.score-b.score);
      if(crossSort==='tier'){const tw=t=>t==='high'?3:t==='medium'?2:1;return crossSortDir*(tw(a.pair.tier)-tw(b.pair.tier))}
      return 0;
    });
  }

  doSort(ranked).forEach((r,idx)=>{
    const p=r.pair;
    const row=el.append('div').attr('class','cross-ranked-row');
    row.append('span').style('width','30px').style('color','#484f58').style('font','9px monospace').style('flex-shrink','0').text('#'+(idx+1));
    row.append('span').style('width','200px').style('white-space','nowrap').style('overflow','hidden').style('text-overflow','ellipsis')
      .style('font','11px monospace').style('color','#c9d1d9').style('flex-shrink','0').text(p.a+' \u00d7 '+p.b);
    const bar=row.append('span').style('width','160px').style('height','6px').style('background','#21262d')
      .style('border-radius','3px').style('overflow','hidden').style('flex-shrink','0');
    if(p.hasChoreography){
      bar.append('span').style('display','block').style('height','100%')
        .style('width',(r.score/maxScore*100)+'%').style('background',crossTierColor(p.tier)).style('border-radius','3px');
    }
    row.append('span').style('width','60px').style('font','9px monospace').style('color',crossTierColor(p.tier)).style('flex-shrink','0').text(p.hasChoreography?p.tier:'\u2014');
    row.append('span').style('width','140px').style('font','9px monospace').style('color','#8b949e').style('flex-shrink','0')
      .text(p.hasChoreography?r.bestDir+' '+(r.score*100).toFixed(0)+'%':'no choreography');
    row.append('span').style('width','120px').style('font','9px monospace').style('color','#6e7681').style('flex-shrink','0')
      .text(p.hasChoreography?'obs: '+p.aObsCount+'/'+p.bObsCount:'');
    row.on('click',()=>showCrossPairDetail(p));
  });
}

function renderCrossMatrix(el,analysis){
  const names=crossData.map(b=>b.name);
  const n=names.length;
  const cellSize=80,labelH=24,labelW=110;
  const svg=el.append('svg').attr('width',labelW+n*cellSize).attr('height',labelH+n*cellSize)
    .style('display','block').style('margin','8px 0 20px');
  const pm={};analysis.pairs.forEach(p=>{pm[p.a+'::'+p.b]=p});
  names.forEach((name,ri)=>{
    svg.append('text').attr('x',labelW-6).attr('y',labelH+ri*cellSize+cellSize/2+4)
      .attr('text-anchor','end').attr('fill','#8b949e').style('font','9px monospace')
      .text(name.length>14?name.substring(0,12)+'..':name);
    svg.append('text').attr('x',labelW+ri*cellSize+cellSize/2).attr('y',labelH-6)
      .attr('text-anchor','middle').attr('fill','#8b949e').style('font','9px monospace')
      .text(name.length>14?name.substring(0,12)+'..':name);
  });
  for(let i=0;i<n;i++){
    for(let j=0;j<n;j++){
      const cx=labelW+j*cellSize,cy=labelH+i*cellSize;
      if(i===j){svg.append('rect').attr('x',cx+2).attr('y',cy+2).attr('width',cellSize-4).attr('height',cellSize-4).attr('fill','#0d1117').attr('rx',3).attr('stroke','#21262d');continue}
      const a=names[i],b=names[j];
      const pair=pm[a+'::'+b]||pm[b+'::'+a];
      if(!pair){continue}
      const g=svg.append('g').style('cursor','pointer');
      if(pair.hasChoreography){
        const isA=names[i]===pair.a;
        const shift=isA?pair.shiftA:pair.shiftB;
        const obsCount=isA?pair.aObsCount:pair.bObsCount;
        g.append('rect').attr('x',cx+2).attr('y',cy+2).attr('width',cellSize-4).attr('height',cellSize-4)
          .attr('fill',crossTierBg(pair.tier)).attr('rx',3).attr('stroke',crossTierColor(pair.tier)).attr('stroke-width',1.5);
        g.append('text').attr('x',cx+cellSize/2).attr('y',cy+18).attr('text-anchor','middle')
          .attr('fill',crossTierColor(pair.tier)).style('font','bold 10px monospace').text((shift*100).toFixed(0)+'%');
        g.append('text').attr('x',cx+cellSize/2).attr('y',cy+36).attr('text-anchor','middle')
          .attr('fill','#6e7681').style('font','8px monospace').text(obsCount+' obs');
        g.append('text').attr('x',cx+cellSize/2).attr('y',cy+52).attr('text-anchor','middle')
          .attr('fill','#484f58').style('font','8px monospace').text(pair.tier);
        g.on('click',()=>showCrossPairDetail(pair));
        g.on('mouseenter',function(event){
          d3.select(this).select('rect').attr('stroke-width',2.5);
          const from=isA?pair.a:pair.b,to=isA?pair.b:pair.a;
          let html='<div class="tt-title">'+from+' paused \u2192 '+to+'</div>';
          html+='<div class="tt-line">shift: <span>'+(shift*100).toFixed(1)+'%</span></div>';
          html+='<div class="tt-line">certainty: <span>'+pair.tier+'</span></div>';
          showTip(html,event.clientX,event.clientY);
        })
        .on('mouseleave',function(){d3.select(this).select('rect').attr('stroke-width',1.5);hideTip()});
      } else {
        g.append('rect').attr('x',cx+2).attr('y',cy+2).attr('width',cellSize-4).attr('height',cellSize-4)
          .attr('fill','#0d1117').attr('rx',3).attr('stroke','#21262d').attr('stroke-width',1);
        g.append('text').attr('x',cx+cellSize/2).attr('y',cy+30).attr('text-anchor','middle')
          .attr('fill','#484f58').style('font','9px monospace').text('no data');
        g.on('click',()=>showCrossPairDetail(pair));
      }
    }
  }
}

function renderCrossCausality(el,analysis){
  const edges=[];
  analysis.pairs.forEach(pair=>{
    if(!pair.hasChoreography) return;
    if(pair.shiftB>0.1) edges.push({from:pair.a,to:pair.b,strength:pair.shiftB,tier:pair.tier,pair});
    if(pair.shiftA>0.1) edges.push({from:pair.b,to:pair.a,strength:pair.shiftA,tier:pair.tier,pair});
  });

  const fromMap={};
  edges.forEach(e=>{if(!fromMap[e.from])fromMap[e.from]=[];fromMap[e.from].push(e)});
  const outSum={},inSum={};
  edges.forEach(e=>{outSum[e.from]=(outSum[e.from]||0)+e.strength;inSum[e.to]=(inSum[e.to]||0)+e.strength});
  const maxImpact=d3.max([...Object.values(outSum),...Object.values(inSum)])||1;

  function nodeColor(name){
    const out=(outSum[name]||0),inc=(inSum[name]||0);
    if(out>inc) return d3.interpolateRgb('#30363d','#3fb950')(Math.min(out/maxImpact,1));
    if(inc>0) return d3.interpolateRgb('#30363d','#f0883e')(Math.min(inc/maxImpact,1));
    return '#484f58';
  }

  el.append('div').style('font-size','10px').style('color','#6e7681').style('margin-bottom','10px')
    .html('nodes colored by impact: <span style="color:#3fb950">causes interference</span> | <span style="color:#f0883e">affected by interference</span> | <span style="color:#484f58">isolated</span> | hover nodes and edges for detail');

  if(!edges.length){
    el.append('div').attr('class','info').text('no significant causation edges found (shift < 10%) \u2014 run a choreography or check the ranked/matrix tabs');
    return;
  }

  const subTabs=el.append('div').attr('id','causalitySubTabs').style('display','flex').style('gap','8px').style('margin-bottom','12px');
  let causalitySub='reach';
  function highlightSubTabs(){
    subTabs.selectAll('button')
      .style('background',function(){return d3.select(this).datum()===causalitySub?'#238636':'#21262d'})
      .style('color',function(){return d3.select(this).datum()===causalitySub?'#fff':'#8b949e'});
  }
  subTabs.append('button').datum('reach').style('border','none')
    .style('padding','3px 10px').style('border-radius','3px').style('cursor','pointer').style('font-family','inherit').style('font-size','11px')
    .text('reachability trees').on('click',function(){causalitySub='reach';highlightSubTabs();d3.select('#causalityContent').html('');renderCausalityContent()});
  subTabs.append('button').datum('sankey').style('border','none')
    .style('padding','3px 10px').style('border-radius','3px').style('cursor','pointer').style('font-family','inherit').style('font-size','11px')
    .text('sankey flow').on('click',function(){causalitySub='sankey';highlightSubTabs();d3.select('#causalityContent').html('');renderCausalityContent()});
  subTabs.append('button').datum('topo').style('border','none')
    .style('padding','3px 10px').style('border-radius','3px').style('cursor','pointer').style('font-family','inherit').style('font-size','11px')
    .text('topological layers').on('click',function(){causalitySub='topo';highlightSubTabs();d3.select('#causalityContent').html('');renderCausalityContent()});
  highlightSubTabs();

  const cEl=el.append('div').attr('id','causalityContent');

  function renderCausalityContent(){
    cEl.html('');
    const pd=d3.select('#crossPairDetail');if(pd.size()){pd.classed('show',false);pd.html('')}
    if(causalitySub==='reach') renderReach(cEl);
    else if(causalitySub==='sankey') renderSankeyView(cEl);
    else renderTopoView(cEl);
  }
  renderCausalityContent();

  function buildDag(edgeList){
    const pairBest={};
    edgeList.forEach(e=>{
      const key=[e.from,e.to].sort().join('::');
      if(!pairBest[key]||e.strength>pairBest[key].strength) pairBest[key]=e;
    });
    const dag=[...Object.values(pairBest)].sort((a,b)=>b.strength-a.strength);
    const adj={};dag.forEach(e=>{if(!adj[e.from])adj[e.from]=[];adj[e.from].push(e.to)});
    const visited=new Set(),stack=new Set();
    function hasCycle(n){if(stack.has(n))return true;if(visited.has(n))return false;visited.add(n);stack.add(n);for(const c of(adj[n]||[]))if(hasCycle(c))return true;stack.delete(n);return false}
    while(dag.length>1){
      visited.clear();stack.clear();
      let cycle=false;
      for(const n of new Set(dag.flatMap(e=>[e.from,e.to]))){if(hasCycle(n)){cycle=true;break}}
      if(!cycle) break;
      dag.pop();
      Object.keys(adj).forEach(k=>delete adj[k]);
      dag.forEach(e=>{if(!adj[e.from])adj[e.from]=[];adj[e.from].push(e.to)});
    }
    return dag;
  }

  function renderReach(container){
    const dag=buildDag(edges);
    const dagFrom={};
    dag.forEach(e=>{if(!dagFrom[e.from])dagFrom[e.from]=[];dagFrom[e.from].push(e)});
    const grid=container.append('div').style('display','grid').style('grid-template-columns','repeat(auto-fill,minmax(280px,1fr))').style('gap','12px');
    crossData.forEach(b=>{
      const card=grid.append('div').attr('class','cross-tree-card');
      const hdr=card.append('div').style('display','flex').style('align-items','center').style('gap','6px').style('margin-bottom','6px');
      hdr.append('span').style('width','8px').style('height','8px').style('border-radius','2px').style('background',nodeColor(b.name)).style('flex-shrink','0');
      hdr.append('span').style('font','bold 10px monospace').style('color','#c9d1d9').text(b.name);
      const outE=dag.filter(e=>e.from===b.name);
      const inE=dag.filter(e=>e.to===b.name);
      hdr.append('span').style('font','9px monospace').style('color','#6e7681')
        .text(outE.length?outE.length+' out':'sink');
      if(!outE.length){
        card.append('div').style('font','9px monospace').style('color','#484f58').style('padding-left','14px')
          .text(inE.length?'sink \u2014 receives only':'isolated');
        return;
      }
      function buildLevel(parent,name,visited){
        const kids=dagFrom[name]||[];
        kids.forEach((e,ei)=>{
          if(visited.has(e.to)){
            if(ei<2) parent.append('div').style('padding','2px 0 2px 14px').style('border-left','1px solid #21262d').style('margin-left','8px')
              .append('span').style('font','8px monospace').style('color','#6e7681').text('\u21A9 '+e.to);
            else if(ei===2) parent.append('div').style('padding','2px 0 2px 14px').style('border-left','1px solid #21262d').style('margin-left','8px')
              .append('span').style('font','8px monospace').style('color','#484f58').text('\u21A9 +'+(kids.length-ei)+' more');
            return;
          }
          const row=parent.append('div').style('display','flex').style('align-items','center').style('gap','4px')
            .style('padding','2px 0 2px 14px').style('border-left','1px solid #21262d').style('margin-left','8px').style('cursor','pointer');
          const grandKids=(dagFrom[e.to]||[]).filter(c=>!visited.has(c.to));
          if(grandKids.length){
            const toggle=row.append('span').style('font','8px monospace').style('color','#6e7681').style('cursor','pointer').style('user-select','none').text('\u25B6');
            const childWrap=parent.append('div').style('display','none');
            buildLevel(childWrap,e.to,new Set([...visited,e.to]));
            toggle.on('click',function(ev){
              ev.stopPropagation();
              if(childWrap.style('display')==='none'){childWrap.style('display','block');d3.select(this).text('\u25BC')}
              else{childWrap.style('display','none');d3.select(this).text('\u25B6')}
            });
          }
          row.append('span').style('font','8px monospace').style('color',crossTierColor(e.tier)).text((e.strength*100).toFixed(0)+'%');
          row.append('span').style('font','9px monospace').style('color','#c9d1d9').text(e.to);
          row.on('click',()=>showCrossPairDetail(e.pair));
          row.on('mouseenter',function(ev){showTip('<div class="tt-title">'+e.from+' \u2192 '+e.to+'</div><div class="tt-line">shift: <span>'+(e.strength*100).toFixed(0)+'%</span></div>',ev.clientX,ev.clientY)})
            .on('mouseleave',hideTip);
        });
      }
      buildLevel(card,b.name,new Set([b.name]));
    });
  }

  function renderSankeyView(container){
    if(typeof d3.sankey==='undefined'){container.append('div').attr('class','error').text('d3-sankey library not loaded (needs network)');return}
    const dag=buildDag(edges);
    if(dag.length<1){container.append('div').attr('class','info').text('no acyclic edges for sankey layout');return}
    try{
      const size=Math.min(700,window.innerWidth-80);
      const margin={top:10,right:20,bottom:10,left:20};
      const w=size-margin.left-margin.right,h=400-margin.top-margin.bottom;
      const svg=container.append('svg').attr('width',size).attr('height',400).style('display','block').style('margin','10px auto');
      const nodeNames=[...new Set(dag.flatMap(e=>[e.from,e.to]))];
      const ni={};nodeNames.forEach((n,i)=>ni[n]=i);
      const sd={
        nodes:nodeNames.map((name,i)=>({id:i,name,color:nodeColor(name)})),
        links:dag.map(e=>({source:ni[e.from],target:ni[e.to],value:Math.max(e.strength*100,5),strength:e.strength,tier:e.tier,pair:e.pair}))
      };
      const res=d3.sankey().nodeId(d=>d.id).nodeWidth(16).nodePadding(20)
        .extent([[margin.left,margin.top],[w+margin.left,h+margin.top]])(sd);
      svg.append('g').selectAll('path').data(res.links).join('path')
        .attr('d',d3.sankeyLinkHorizontal()).attr('fill','none')
        .attr('stroke',d=>crossTierColor(d.tier)).attr('stroke-opacity',0.4)
        .attr('stroke-width',d=>Math.max(2,d.value/4))
        .style('cursor','pointer')
        .on('mouseenter',function(ev,d){d3.select(this).attr('stroke-opacity',0.8);showTip(d.source.name+' \u2192 '+d.target.name+' ('+(d.strength*100).toFixed(0)+'%)',ev.clientX,ev.clientY)})
        .on('mouseleave',function(){d3.select(this).attr('stroke-opacity',0.4);hideTip()})
        .on('click',(ev,d)=>showCrossPairDetail(d.pair));
      const ng=svg.append('g').selectAll('g').data(res.nodes).join('g');
      ng.append('rect').attr('x',d=>d.x0).attr('y',d=>d.y0).attr('width',d=>d.x1-d.x0).attr('height',d=>Math.max(1,d.y1-d.y0))
        .attr('fill',d=>d.color).attr('rx',3).attr('stroke','#30363d');
      ng.append('text').attr('x',d=>d.x0>size/2?d.x0-6:d.x1+6).attr('y',d=>(d.y0+d.y1)/2+4)
        .attr('text-anchor',d=>d.x0>size/2?'end':'start').attr('fill','#c9d1d9').style('font','9px monospace').text(d=>d.name);
      ng.style('cursor','pointer').on('mouseenter',function(ev,d){
        showTip(d.name+' \u2014 affects '+dag.filter(e=>e.from===d.name).length+', affected by '+dag.filter(e=>e.to===d.name).length,ev.clientX,ev.clientY);
      }).on('mouseleave',hideTip);
    }catch(err){
      container.append('div').attr('class','error').text('sankey layout failed: '+err.message);
    }
  }

  function renderTopoView(container){
    const dag=buildDag(edges);
    const targets=new Set(dag.map(e=>e.to)),sources=new Set(dag.map(e=>e.from));
    const l0=[],l1=[],l2=[],lIso=[];
    crossData.forEach(b=>{
      const isS=sources.has(b.name),isT=targets.has(b.name);
      if(!isS&&!isT)lIso.push(b.name);
      else if(isS&&!isT)l0.push(b.name);
      else if(!isS&&isT)l2.push(b.name);
      else l1.push(b.name);
    });
    const layers=l1.length>0?[l0,l1,l2]:[l0,l2];
    const labels=l1.length>0?['sources','intermediaries','sinks']:['sources','sinks'];
    const size=Math.min(700,window.innerWidth-80);
    const layerH=120,totalH=layers.length*layerH+(lIso.length?60:0)+40;
    const svg=container.append('svg').attr('width',size).attr('height',totalH).style('display','block').style('margin','10px auto');
    const pos={};
    layers.forEach((layer,li)=>{
      const y=20+li*layerH+layerH/2;
      const gap=size/(layer.length+1);
      layer.forEach((b,bi)=>{pos[b]={x:gap*(bi+1),y}});
      svg.append('text').attr('x',10).attr('y',20+li*layerH+14).attr('fill','#484f58').style('font','9px monospace').text(labels[li]);
    });
    if(lIso.length){
      const isoY=20+layers.length*layerH;
      svg.append('text').attr('x',10).attr('y',isoY+14).attr('fill','#484f58').style('font','9px monospace').text('isolated');
      const isoGap=size/(lIso.length+1);
      lIso.forEach((b,bi)=>{pos[b]={x:isoGap*(bi+1),y:isoY+30}});
    }
    const defs=svg.append('defs');
    ['high','medium','low'].forEach(t=>{const c=crossTierColor(t);defs.append('marker').attr('id','ct-'+t).attr('viewBox','0 0 10 10')
      .attr('refX',10).attr('refY',5).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
      .append('path').attr('d','M 0 1 L 10 5 L 0 9 z').attr('fill',c)});
    const eG=svg.append('g');
    dag.forEach(e=>{
      const f=pos[e.from],t=pos[e.to];if(!f||!t) return;
      const dy=Math.abs(f.y-t.y);
      if(dy<5){
        const mx=(f.x+t.x)/2,my=f.y-45;
        eG.append('path').attr('d','M '+f.x+','+(f.y-14)+' Q '+mx+','+my+' '+t.x+','+(t.y-14)).attr('fill','none')
          .attr('stroke',crossTierColor(e.tier)).attr('stroke-width',1+e.strength*3).attr('opacity',0.5)
          .attr('marker-end','url(#ct-'+e.tier+')').style('cursor','pointer')
          .on('mouseenter',function(ev){d3.select(this).attr('opacity',1);showTip(e.from+' \u2192 '+e.to+' ('+(e.strength*100).toFixed(0)+'%)',ev.clientX,ev.clientY)})
          .on('mouseleave',function(){d3.select(this).attr('opacity',0.5);hideTip()})
          .on('click',()=>showCrossPairDetail(e.pair));
      } else {
        eG.append('line').attr('x1',f.x).attr('y1',f.y+15).attr('x2',t.x).attr('y2',t.y-15)
          .attr('stroke',crossTierColor(e.tier)).attr('stroke-width',1+e.strength*3).attr('opacity',0.5)
          .attr('marker-end','url(#ct-'+e.tier+')').style('cursor','pointer')
          .on('mouseenter',function(ev){d3.select(this).attr('opacity',1);showTip(e.from+' \u2192 '+e.to+' ('+(e.strength*100).toFixed(0)+'%)',ev.clientX,ev.clientY)})
          .on('mouseleave',function(){d3.select(this).attr('opacity',0.5);hideTip()})
          .on('click',()=>showCrossPairDetail(e.pair));
      }
    });
    const nG=svg.append('g');
    crossData.forEach(b=>{
      const p=pos[b.name];if(!p) return;
      const g=nG.append('g').style('cursor','pointer');
      g.append('rect').attr('x',p.x-50).attr('y',p.y-14).attr('width',100).attr('height',28)
        .attr('fill','#161b22').attr('stroke',nodeColor(b.name)).attr('stroke-width',1.5).attr('rx',4);
      g.append('text').attr('x',p.x).attr('y',p.y+4).attr('text-anchor','middle').attr('fill','#c9d1d9')
        .style('font','9px monospace').text(b.name.length>14?b.name.substring(0,12)+'..':b.name);
      g.on('mouseenter',function(ev){
        const oe=dag.filter(e=>e.from===b.name),ie=dag.filter(e=>e.to===b.name);
        showTip(b.name+' \u2014 affects '+oe.length+', affected by '+ie.length,ev.clientX,ev.clientY);
      }).on('mouseleave',hideTip);
    });
  }
}

function renderCrossABA(el,analysis){
  if(!choreographyData||!choreographyData.choreographies||!choreographyData.choreographies.length){
    el.append('div').attr('class','info').text('no choreography data available');
    return;
  }
  const choreo=choreographyData.choreographies.find(c=>c.status==='running')||choreographyData.choreography[0];
  if(!choreo){el.append('div').attr('class','info').text('no choreography found');return}

  const phases=choreo.phases;
  const currentPhase=choreo.current_phase;
  const totalPhases=choreo.total_phases;

  const statusDiv=el.append('div').style('margin-bottom','12px');
  statusDiv.append('span').style('font','bold 12px monospace').style('color','#c9d1d9')
    .text('ABA Choreography '+choreo.id.substring(0,8));
  statusDiv.append('span').style('font','10px monospace').style('color','#6e7681').style('margin-left','12px')
    .text('status: '+choreo.status+' | phase: '+currentPhase+'/'+totalPhases+' | participants: '+choreo.participants.join(', '));
  if(choreo.updated_at){
    statusDiv.append('span').style('font','9px monospace').style('color','#484f58').style('margin-left','12px')
      .text('last update: '+choreo.updated_at);
  }

  const phaseColors=['#3fb950','#58a6ff','#d29922','#bc8cff','#f0883e','#f85149','#8b8000','#79c0ff'];
  const stepperW=Math.min(900,window.innerWidth-60);
  const phaseW=stepperW/phases.length;
  const rowH=50;
  const h=crossData.length*rowH+70;
  const svg=el.append('svg').attr('width',stepperW).attr('height',h);

  phases.forEach((phase,i)=>{
    const x=i*phaseW;
    const isObs=phase.observe_breeder!=null;
    const isCurrent=i===currentPhase;

    svg.append('rect').attr('x',x+1).attr('y',0).attr('width',phaseW-2).attr('height',h)
      .attr('fill',isObs?'rgba(88,166,255,0.06)':'rgba(63,185,80,0.04)').attr('rx',2);

    if(isCurrent){
      svg.append('rect').attr('x',x).attr('y',0).attr('width',phaseW).attr('height',h)
        .attr('fill','none').attr('stroke','#c9d1d9').attr('stroke-width',2).attr('rx',2)
        .attr('stroke-dasharray','4,2');
    }

    svg.append('text').attr('x',x+phaseW/2).attr('y',16).attr('text-anchor','middle')
      .attr('fill',phaseColors[i%phaseColors.length]).style('font','bold 9px monospace')
      .text((i+1)+'. '+(phase.label||(i%3===0?'baseline':i%3===1?'observe':'recovery')));

    if(isObs&&phase.observe_breeder){
      const obsName=crossData.find(b=>b.id===phase.observe_breeder||phase.observe_breeder.startsWith(b.id.substring(0,8)));
      svg.append('text').attr('x',x+phaseW/2).attr('y',28).attr('text-anchor','middle')
        .attr('fill','#58a6ff').style('font','7px monospace')
        .text('obs: '+(obsName?obsName.name:phase.observe_breeder.substring(0,8)+'..'));
    }
  });

  crossData.forEach((b,bi)=>{
    const y=38+bi*rowH;

    svg.append('text').attr('x',4).attr('y',y+rowH/2+3)
      .attr('fill','#c9d1d9').style('font','9px monospace').style('font-weight','bold')
      .text(b.name.length>10?b.name.substring(0,8)+'..':b.name);

    phases.forEach((phase,i)=>{
      const x=i*phaseW;
      const phaseTrials=b.trials.filter(t=>t.user_attrs&&t.user_attrs.choreography_phase_idx===i);
      const activeTrials=phaseTrials.filter(t=>!t.user_attrs||t.user_attrs.phase!=='observe_only');
      const obsTrials=phaseTrials.filter(t=>t.user_attrs&&t.user_attrs.phase==='observe_only');
      const trialsToShow=obsTrials.length?obsTrials:activeTrials;
      const trialQs=trialsToShow.map(t=>crossQ(t)).filter(q=>q!=null&&isFinite(q));
      const medQ=trialQs.length?d3.median(trialQs):null;

      const barH=22;
      const barY=y+rowH/2-barH/2;
      const barX=x+36;
      const barW=phaseW-42;

      svg.append('rect').attr('x',barX).attr('y',barY).attr('width',barW).attr('height',barH)
        .attr('fill','#161b22').attr('stroke','#21262d').attr('rx',2);

      if(medQ!==null&&isFinite(medQ)){
        const fillW=Math.max(2,medQ*barW);
        const c=qualityScale(medQ);
        svg.append('rect').attr('x',barX).attr('y',barY).attr('width',fillW).attr('height',barH)
          .attr('fill',c).attr('opacity',0.7).attr('rx',2);
        svg.append('text').attr('x',barX+4).attr('y',barY+barH/2+3)
          .attr('fill','rgba(0,0,0,0.8)').style('font','bold 8px monospace')
          .text((medQ*100).toFixed(0)+'%');
      }

      const isObserving=phase.observe_breeder&&(b.id===phase.observe_breeder||phase.observe_breeder.startsWith(b.id.substring(0,8)));
      if(isObserving){
        svg.append('rect').attr('x',barX-12).attr('y',barY+2).attr('width',10).attr('height',barH-4)
          .attr('fill','#58a6ff').attr('opacity',0.5).attr('rx',1);
      }

      svg.append('text').attr('x',barX+barW+2).attr('y',barY+barH/2+3)
        .attr('fill',isObserving?'#58a6ff':'#484f58').style('font','7px monospace')
        .text(trialsToShow.length+'t');
    });
  });

  const compareDiv=el.append('div').style('margin-top','16px').style('padding','12px').style('background','#0d1117').style('border','1px solid #21262d').style('border-radius','6px');
  compareDiv.append('div').style('font','bold 10px monospace').style('color','#c9d1d9').style('margin-bottom','8px').text('Phase comparison');
  const compTable=compareDiv.append('div').style('display','grid').style('grid-template-columns','120px repeat('+phases.length+', 1fr)').style('gap','2px');
  compTable.append('div').style('font','8px monospace').style('color','#484f58');
  phases.forEach((p,i)=>compTable.append('div').style('font','8px monospace').style('color',phaseColors[i%phaseColors.length]).style('text-align','center').text('P'+i));

  crossData.forEach(b=>{
    compTable.append('div').style('font','8px monospace').style('color','#8b949e').text(b.name.substring(0,12));
    phases.forEach((phase,i)=>{
      const phaseTrials=b.trials.filter(t=>t.user_attrs&&t.user_attrs.choreography_phase_idx===i);
      const activeTrials=phaseTrials.filter(t=>!t.user_attrs||t.user_attrs.phase!=='observe_only');
      const obsTrials=phaseTrials.filter(t=>t.user_attrs&&t.user_attrs.phase==='observe_only');
      const trialsToShow=obsTrials.length?obsTrials:activeTrials;
      const trialQs=trialsToShow.map(t=>crossQ(t)).filter(q=>q!=null&&isFinite(q));
      const medQ=trialQs.length?d3.median(trialQs):null;
      const cell=compTable.append('div').style('font','8px monospace').style('text-align','center').style('padding','2px')
        .style('border-radius','2px');
      if(medQ!==null){
        cell.style('background',qualityScale(medQ)).style('color','rgba(0,0,0,0.7)')
          .text((medQ*100).toFixed(0)+'% ('+trialsToShow.length+')');
      } else {
        cell.style('color','#30363d').text('—');
      }
    });
  });
}

async function api(path){
  if(DEMO){throw new Error('no api in demo mode')}
  const r=await fetch(baseUrl+path);
  if(!r.ok) throw new Error(r.status+' '+await r.text());
  return r.json();
}

function trialValue(t,objIdx){
  if(!t.values||t.state!=='COMPLETE') return null;
  const v=t.values[objIdx];
  return v===null||v===undefined?null:v;
}

function objValues(objIdx){
  return trials.map(t=>trialValue(t,objIdx)).filter(v=>v!==null&&v!==undefined);
}

function valueQuality(val,objIdx){
  if(val===null||val===undefined) return 0;
  if(!breederConfig) return 0.5;
  const obj=breederConfig.objectives[objIdx];
  if(!obj) return 0.5;
  const vals=objValues(objIdx);
  const mn=d3.min(vals),mx=d3.max(vals);
  const range=mx-mn||1;
  const norm=(val-mn)/range;
  return obj.direction==='maximize'?norm:(1-norm);
}

function trialQuality(t){
  if(Object.keys(checkGuardrails(t)).length) return 0;
  if(!breederConfig) return 0;
  let sum=0,cnt=0;
  breederConfig.objectives.forEach((_,i)=>{const v=trialValue(t,i);if(v!==null&&v!==undefined){sum+=valueQuality(v,i);cnt++}});
  return cnt?sum/cnt:0;
}

function getGuardrailReadings(t){
  if(!t.user_attrs||!t.user_attrs.guardrails) return{};
  try{return typeof t.user_attrs.guardrails==='string'?JSON.parse(t.user_attrs.guardrails):t.user_attrs.guardrails}
  catch(e){return{}}
}
function checkGuardrails(t){
  const readings=getGuardrailReadings(t);
  const violated={};
  Object.entries(readings).forEach(([k,r])=>{if(r.violated) violated[k]={value:r.value,limit:r.hard_limit}});
  return violated;
}

const qualityScale=d3.scaleLinear().domain([0,0.5,1]).range(['#f85149','#8b8000','#3fb950']).interpolate(d3.interpolateRgb);
function qColor(q){return q===null||q===undefined?'#30363d':qualityScale(q)}

function bestTrialIdx(){return trials.reduce((bi,t,i)=>trialQuality(t)>trialQuality(trials[bi])?i:bi,0)}
