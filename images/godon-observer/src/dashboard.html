<script>
if(location.protocol==='file:'){
  document.write('<script src="https://d3js.org/d3.v7.min.js"><\/script>');
  document.write('<script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"><\/script>');
} else {
  document.write('<script src="/d3.js"><\/script>');
  document.write('<script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"><\/script>');
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code','Consolas',monospace;background:#0d1117;color:#c9d1d9;font-size:13px}
header{background:#161b22;border-bottom:1px solid #30363d;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;color:#e6edf3}header h1 span{color:#3fb950}
.bar{background:#161b22;border-bottom:1px solid #30363d;padding:8px 20px;display:flex;align-items:center;gap:12px}
.bar label{color:#8b949e;min-width:50px}
.bar input[type="text"]{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:3px 8px;border-radius:3px;font-family:inherit;width:280px}
.bar button{background:#238636;color:#fff;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;font-family:inherit}
.bar button:hover{background:#2ea043}
nav{background:#161b22;border-bottom:1px solid #30363d;padding:0 20px;display:flex}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:#8b949e;padding:8px 14px;cursor:pointer;font-family:inherit;font-size:12px}
nav button.active{color:#e6edf3;border-bottom-color:#3fb950}
nav button:hover{color:#c9d1d9}
.content{padding:16px 20px;overflow-y:auto;height:calc(100vh - 120px)}
.legend{display:flex;gap:16px;margin-bottom:10px;font-size:11px}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:2px}
.slider-row{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:12px;color:#8b949e}
.slider-row input[type="range"]{flex:1;position:relative;height:8px;-webkit-appearance:none;appearance:none;background:transparent}
.slider-row input[type="range"]::-webkit-slider-runnable-track{background:#21262d;height:8px;border-radius:4px}
.slider-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:4px;height:14px;background:#e6edf3;border-radius:2px;margin-top:-3px}
.slider-row input[type="range"]::-moz-range-track{background:#21262d;height:8px;border-radius:4px}

.slider-row input[type="range"].quality-track::-webkit-slider-runnable-track{background:transparent}

.tooltip{position:fixed;background:#1c2128;border:1px solid #30363d;border-radius:6px;padding:8px 12px;font-size:11px;pointer-events:none;z-index:100;max-width:300px;display:none}
.error{background:#2a1a1a;border:1px solid #da3633;border-radius:4px;padding:8px;color:#f85149;margin:8px 0}
.info{background:#1a2a1a;border:1px solid #238636;border-radius:4px;padding:8px;color:#3fb950;margin:8px 0}
.status{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #30363d;padding:4px 20px;font-size:10px;color:#8b949e;display:flex;justify-content:space-between}
.hm-cell{cursor:pointer}
.hm-cell:hover{stroke:#fff;stroke-width:2}
.pc-line{fill:none;cursor:pointer}
.pc-line:hover{stroke-width:3!important;opacity:1!important}
.sp-line{fill:none;stroke-linejoin:round}
.ov-list{list-style:none;padding:0;margin:0}
.ov-row{display:flex;align-items:center;gap:16px;padding:10px 24px;border-bottom:1px solid #21262d;cursor:pointer;transition:background 0.15s}
.ov-row:hover{background:#161b22}
.ov-row:hover .ov-name{color:#e6edf3}
.ov-row.selected{background:#1c2128;border-left:3px solid #3fb950;padding-left:21px}
.ov-name{flex:1;font-size:13px;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:120px}
.ov-trials{width:60px;text-align:right;font-size:12px;color:#8b949e;flex-shrink:0}
.ov-created{width:130px;text-align:right;font-size:11px;color:#6e7681;flex-shrink:0}
.ov-loading{text-align:center;padding:40px;color:#6e7681;font-size:12px}
.ov-cross-bar{display:none;align-items:center;gap:12px;padding:8px 24px;background:#161b22;border-bottom:1px solid #30363d}
.ov-cross-bar.show{display:flex}
.ov-cross-btn{background:#238636;color:#fff;border:none;padding:5px 14px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:12px}
.ov-cross-btn:hover{background:#2ea043}
.ov-cross-btn:disabled{background:#21262d;color:#484f58;cursor:default}
.ov-cross-count{font-size:11px;color:#8b949e}
.ov-cross-clear{background:none;border:none;color:#6e7681;cursor:pointer;font-family:inherit;font-size:11px}
.ov-cross-clear:hover{color:#c9d1d9}
.ov-header{display:flex;align-items:center;gap:16px;padding:8px 24px;border-bottom:1px solid #30363d;background:#0d1117}
.ov-header button{background:none;border:none;color:#6e7681;cursor:pointer;font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:0}
.ov-header button:hover{color:#c9d1d9}
.ov-header button .sort-arrow{margin-left:4px;font-size:9px}
.ov-header .ov-h-name{flex:1;min-width:120px;text-align:left}
.ov-header .ov-h-trials{width:60px;text-align:right}
.ov-header .ov-h-created{width:130px;text-align:right}
.back-btn{background:none;border:none;color:#3fb950;cursor:pointer;font-family:inherit;font-size:13px;padding:0 8px}
.back-btn:hover{text-decoration:underline}
.cross-tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid #30363d}
.cross-tabs button{background:none;border:none;color:#6e7681;cursor:pointer;font-family:inherit;font-size:12px;padding:6px 14px;border-bottom:2px solid transparent}
.cross-tabs button:hover{color:#c9d1d9}
.cross-tabs button.active{color:#e6edf3;border-bottom-color:#3fb950}
.cross-ranked-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-bottom:1px solid #21262d;cursor:pointer;transition:background .1s}
.cross-ranked-row:hover{background:#161b22}
.cross-ranked-header{display:flex;align-items:center;gap:10px;padding:5px 10px;border-bottom:1px solid #30363d;font-size:10px;color:#6e7681;cursor:pointer;user-select:none}
.cross-ranked-header:hover{color:#c9d1d9}
.cross-ranked-header.sorted{color:#c9d1d9}
.cross-pair-detail{display:none;padding:16px 0;border-top:1px solid #21262d;margin-top:16px}
.cross-pair-detail.show{display:block}
.cross-method-row{display:flex;align-items:center;gap:10px;padding:3px 0;font-size:10px;color:#6e7681}
.cross-m-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cross-m-dot.on{background:#3fb950}
.cross-m-dot.off{background:#30363d}
.cross-m-bar{flex:1;height:3px;background:#21262d;border-radius:1.5px;max-width:120px;overflow:hidden}
.cross-tree-card{border:1px solid #21262d;border-radius:6px;padding:10px 12px;background:#0d1117}
.cross-tree-node{display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer}
.cross-tree-node:hover{background:#161b22}
.cross-tree-children{padding-left:18px;border-left:1px solid #21262d;margin-left:8px}
.cross-close-btn{background:none;border:none;color:#6e7681;cursor:pointer;font-family:inherit;font-size:11px;padding:0}
.cross-close-btn:hover{color:#c9d1d9}
</style>
</head>
<body>
<header><h1>godon <span>observer</span></h1><span id="clock" style="font-size:11px;color:#8b949e"></span></header>
<div class="bar" id="bar">
<button class="back-btn" id="backBtn" style="display:none">&#8592; overview</button>
<label>breeder:</label><input type="text" id="breederId" placeholder="paste breeder UUID">
<button id="loadBtn">load</button>
<span id="loadStatus" style="color:#8b949e;font-size:11px"></span>
</div>
<nav id="nav">
<button class="active" data-view="heatmap">heatmap</button>
<button data-view="spider">spider web</button>
<button data-view="parallel">parallel coordinates</button>
<button data-view="convergence">convergence</button>
<button data-view="trajectory">trajectory</button>
<button data-view="heartbeat">heartbeat</button>
<button data-view="guardrails">guardrails</button>
<button data-view="interference">interference</button>
</nav>
<div class="summary" id="summary"></div>
<div id="demo-cfg" style="display:none;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:8px 12px;margin-bottom:8px;font:9px monospace;color:#8b949e" data-trials="100" data-period="20" data-spike="0.30" data-echo="0.15" data-noise="0.04">
  <span style="color:#c9d1d9;font-weight:bold">impulse config</span>&nbsp;
  trials <input id="cfg-trials" type="number" value="100" min="20" max="500" style="width:50px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:3px;padding:1px 4px;font:9px monospace">
  period <input id="cfg-period" type="number" value="20" min="5" max="100" style="width:40px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:3px;padding:1px 4px;font:9px monospace">
  spike <input id="cfg-spike" type="number" value="0.30" min="0.05" max="0.50" step="0.05" style="width:45px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:3px;padding:1px 4px;font:9px monospace">
  echo <input id="cfg-echo" type="number" value="0.15" min="0.00" max="0.40" step="0.05" style="width:40px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:3px;padding:1px 4px;font:9px monospace">
  noise <input id="cfg-noise" type="number" value="0.04" min="0.01" max="0.20" step="0.01" style="width:40px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:3px;padding:1px 4px;font:9px monospace">
  <button id="cfg-apply" style="background:#21262d;border:1px solid #30363d;color:#58a6ff;border-radius:3px;padding:1px 8px;font:9px monospace;cursor:pointer">apply</button>
</div>
<div class="content" id="content"></div>
<div class="tooltip" id="tooltip"></div>
<div class="status"><span id="statusL">ready</span><span id="statusR"></span></div>
<script>
const $=id=>document.getElementById(id);
let breederConfig=null,trials=[],currentView='heatmap',baseUrl='',refreshTimer=null;
let lastMode='active',wmProbesCount=0,wmReconCount=0;

const DEMO=!window.location.protocol.startsWith('http');
function status(m){$('statusL').textContent=m}

// ═══════════════════════════════════════════════════
// Single source of truth for all demo data
// ═══════════════════════════════════════════════════
const DEMO_DATA=(function(){
  const NB=6;
  const N_TRIALS=100;
  const IMPULSE_PERIOD=20;
  const PARAM_NAMES=['co2_injection','heating_setpoints','irrigation','light_intensity','shading','vent_openings'];
  const OBJECTIVES=[
    {name:'growth_rate',direction:'maximize'},
    {name:'energy_kwh',direction:'minimize'},
    {name:'water_liters',direction:'minimize'}
  ];
  const GUARDRAILS=[
    {name:'max_temp',hard_limit:40},
    {name:'max_humidity',hard_limit:0.9},
    {name:'max_co2',hard_limit:1500}
  ];
  const COUPLED=[[0,1],[1,2],[2,3],[3,4],[4,5]];
  const IMPULSE_SPIKE=0.30;
  const IMPULSE_ECHO=0.15;
  const NOISE=0.04;
  const SNR_THRESHOLD=2.5;
  const WINDOW_SIZE=3;
  const breeders=[];
  for(let b=0;b<NB;b++){
    breeders.push({
      id:'mg-'+(b+1)+'-0000-0000-0000-00000000000'+(b+1),
      name:'microgrid-'+(b+1),
      total_trials:N_TRIALS,
      createdAt:'2026-06-07T0'+(8+b)+':00:00Z'
    });
  }
  const allTrials=[];
  const impulsePositions=[];
  for(let t=0;t<N_TRIALS;t++){
    if(t%IMPULSE_PERIOD===0&&t>0) impulsePositions.push(t);
  }
  for(let b=0;b<NB;b++){
    const trials=[];
    const inboundNeighbors=COUPLED.filter(c=>c[1]===b).map(c=>c[0]);
    for(let i=0;i<N_TRIALS;i++){
      const p=(()=>{const o={};PARAM_NAMES.forEach(k=>{o[k]=+(Math.random()*10).toFixed(2)});return o})();
      const h=Math.floor(i/6),m=i%6;
      const max_temp=+(33+Math.random()*12).toFixed(1);
      const max_humidity=+(0.78+Math.random()*0.2).toFixed(3);
      const max_co2=+(1000+Math.random()*700).toFixed(0);
      const attrs={};
      const isImpulse=i%IMPULSE_PERIOD===0&&i>0;
      if(isImpulse){
        attrs.watermark=JSON.stringify({type:'impulse',duty_cycle:+(1/IMPULSE_PERIOD).toFixed(4),period:IMPULSE_PERIOD,direction:'random',params:[{param_name:'power_draw',amplitude:75}]});
        attrs.watermark_trial_idx=i;
        attrs.watermark_active='true';
      } else {
        attrs.watermark='off';
      }
      attrs.guardrails=JSON.stringify({max_temp:{value:max_temp,hard_limit:40,violated:max_temp>40},max_humidity:{value:max_humidity,hard_limit:0.9,violated:max_humidity>0.9},max_co2:{value:+max_co2,hard_limit:1500,violated:+max_co2>1500}});
      let growth=0.45+(Math.random()-0.5)*NOISE;
      if(isImpulse) growth+=IMPULSE_SPIKE+Math.random()*0.03;
      inboundNeighbors.forEach(function(ni){
        impulsePositions.forEach(function(imp){
          const dist=i-imp;
          if(dist>=1&&dist<=WINDOW_SIZE) growth+=IMPULSE_ECHO/dist;
        });
      });
      growth=Math.max(0,Math.min(1,growth));
      const energy=200+growth*400+Math.random()*30;
      const water=50+growth*80+Math.random()*10;
      trials.push({
        number:i,state:'COMPLETE',
        datetime_start:'2026-04-17 '+(20+h).toString().padStart(2,'0')+':'+m+'0:00',
        params:p,
        values:[+growth.toFixed(4),+energy.toFixed(4),+water.toFixed(4)],
        user_attrs:attrs
      });
    }
    allTrials.push(trials);
  }
  // Detection results computed from same data
  const detections={};
  for(let si=0;si<NB;si++){
    for(let ri=0;ri<NB;ri++){
      if(si===ri) continue;
      const sName=breeders[si].name;
      const rName=breeders[ri].name;
      const key=sName+'::'+rName;
      const senderTrials=allTrials[si];
      const receiverTrials=allTrials[ri];
      const perObj=OBJECTIVES.map(function(_,oi){
        const vals=receiverTrials.map(t=>t.values?t.values[oi]:null).filter(v=>v!==null);
        const baseline=vals.filter((_,i)=>!impulsePositions.some(imp=>i>=imp&&i<=imp+WINDOW_SIZE));
        const postImpulse=[];
        impulsePositions.forEach(function(imp){
          for(let w=1;w<=WINDOW_SIZE;w++){
            if(imp+w<vals.length) postImpulse.push(vals[imp+w]);
          }
        });
        const bMean=baseline.length?baseline.reduce((a,b)=>a+b,0)/baseline.length:0;
        const bStd=baseline.length?Math.sqrt(baseline.reduce((a,v)=>a+(v-bMean)*(v-bMean),0)/baseline.length):1;
        const sMean=postImpulse.length?postImpulse.reduce((a,b)=>a+b,0)/postImpulse.length:0;
        const shift=sMean-bMean;
        const snr=bStd>0?Math.abs(shift)/bStd:0;
        return {
          objective_index:oi,
          detected:snr>SNR_THRESHOLD,
          method:'impulse_stacking',
          stacked_mean:+sMean.toFixed(3),
          baseline_mean:+bMean.toFixed(3),
          baseline_std:+bStd.toFixed(3),
          shift:+shift.toFixed(3),
          snr:+snr.toFixed(2),
          post_impulse_samples:postImpulse.length,
          baseline_samples:baseline.length,
          impulses_used:impulsePositions.length
        };
      });
      const bestObj=perObj.reduce((best,o)=>o.snr>best.snr?o:best,perObj[0]);
      detections[key]={
        detected:bestObj.snr>SNR_THRESHOLD,
        method:'impulse_stacking',
        impulse_count:impulsePositions.length,
        impulses_used:impulsePositions.length,
        window_size:WINDOW_SIZE,
        snr_threshold:SNR_THRESHOLD,
        best_snr:bestObj.snr,
        best_objective:bestObj.objective_index,
        sender_trials:senderTrials.length,
        receiver_trials:receiverTrials.length,
        watermark:{type:'impulse',duty_cycle:+(1/IMPULSE_PERIOD).toFixed(4),period:IMPULSE_PERIOD,direction:'random',params:[{param_name:'power_draw',amplitude:75}]},
        per_objective:perObj
      };
    }
  }
  return {
    config:{objectives:OBJECTIVES,guardrails:GUARDRAILS,_directions:['MAXIMIZE','MINIMIZE','MINIMIZE']},
    breeders:breeders,
    trials:allTrials,
    detections:detections,
    coupledPairs:COUPLED,
    impulsePositions:impulsePositions,
    params:PARAM_NAMES
  };
})();let overviewMode=true;
let selectedBreeders=[];
let lastClickedIdx=-1;
let sortField='name';
let sortDir=1;

function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-CA')+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function sortedBreeders(breeders){
  return [...breeders].sort((a,b)=>{
    let va,vb;
    if(sortField==='name'){va=a.name.toLowerCase();vb=b.name.toLowerCase();return va<vb?-sortDir:va>vb?sortDir:0}
    if(sortField==='trials'){va=a.total_trials||0;vb=b.total_trials||0}
    if(sortField==='created'){va=new Date(a.createdAt||0).getTime();vb=new Date(b.createdAt||0).getTime()}
    return (va-vb)*sortDir;
  });
}

function updateCrossBar(){
  const bar=$('crossBar');
  const btn=$('crossBtn');
  const count=$('crossCount');
  if(selectedBreeders.length>0){
    bar.classList.add('show');
    btn.disabled=selectedBreeders.length<2;
    count.textContent=selectedBreeders.length+' selected';
  } else {
    bar.classList.remove('show');
  }
  document.querySelectorAll('.ov-row').forEach(row=>{
    const id=row.dataset.id;
    if(selectedBreeders.includes(id)) row.classList.add('selected');
    else row.classList.remove('selected');
  });
}

function toggleSelect(id,idx){
  const pos=selectedBreeders.indexOf(id);
  if(pos>=0) selectedBreeders.splice(pos,1);
  else selectedBreeders.push(id);
  lastClickedIdx=idx;
  updateCrossBar();
}

function rangeSelect(id,idx){
  if(lastClickedIdx<0||lastClickedIdx>=currentBreeders.length){
    toggleSelect(id,idx);
    return;
  }
  const start=Math.min(lastClickedIdx,idx);
  const end=Math.max(lastClickedIdx,idx);
  for(let i=start;i<=end;i++){
    const bid=currentBreeders[i].id;
    if(!selectedBreeders.includes(bid)) selectedBreeders.push(bid);
  }
  updateCrossBar();
}

function clearSelection(){
  selectedBreeders=[];
  lastClickedIdx=-1;
  updateCrossBar();
}

function showOverview(){
  overviewMode=true;
  $('nav').style.display='none';
  $('summary').style.display='none';
  $('backBtn').style.display='none';
  $('bar').querySelector('label').style.display='none';
  $('breederId').style.display='none';
  $('loadBtn').style.display='none';
  $('loadStatus').textContent='';
  if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}
  breederConfig=null;trials=[];
  loadOverview();
}

function showDetail(){
  overviewMode=false;
  $('nav').style.display='flex';
  $('backBtn').style.display='inline';
  $('bar').querySelector('label').style.display='';
  $('breederId').style.display='';
  $('loadBtn').style.display='';
}

async function loadOverview(){
  const el=$('content');
  if(DEMO){
    renderOverview(DEMO_DATA.breeders);
    status('demo mode — '+DEMO_DATA.breeders.length+' breeders');
    return;
  }
  baseUrl=window.location.origin;
  el.innerHTML='<div class="ov-loading">loading breeders...</div>';
  try{
    const breeders=await api('/api/breeders');
    renderOverview(breeders);
    status(breeders.length+' breeders');
  }catch(e){
    el.innerHTML='<div class="error">'+e.message+'</div>';
    status('error: '+e.message);
  }
}

let currentBreeders=[];
let crossData=null;

function renderOverview(breeders){
  currentBreeders=breeders;
  const el=d3.select('#content');
  el.html('');
  if(!breeders.length){
    el.append('div').attr('class','info').text('no breeders found');
    return;
  }

  const crossBar=el.append('div').attr('class','ov-cross-bar').attr('id','crossBar');
  crossBar.append('button').attr('class','ov-cross-btn').attr('id','crossBtn')
    .attr('disabled',true).text('cross').on('click',()=>crossBreeders(selectedBreeders));
  crossBar.append('span').attr('class','ov-cross-count').attr('id','crossCount').text('');
  crossBar.append('button').attr('class','ov-cross-clear').text('clear').on('click',clearSelection);

  const arrow=f=>sortField===f?(sortDir===1?'\u25b2':'\u25bc'):'';
  const hdr=el.append('div').attr('class','ov-header');

async function loadCrossData(ids){
  const el=d3.select('#content');
  el.html('<div class="ov-loading">loading trials for '+ids.length+' breeders...</div>');
  try{
    const breeders=[];
    for(const id of ids){
      let config,trialList;
      if(DEMO){
        const match=DEMO_DATA.breeders.find(b=>b.id===id);
        config={name:match?match.name:id,...DEMO_DATA.config};
        trialList=null;
      } else {
        config=await api('/api-proxy/breeders/'+id);
        if(config.config) Object.keys(config.config).forEach(k=>{if(!config[k])config[k]=config.config[k]});
        const studies=await api('/api/breeders/'+id+'/studies');
        if(!studies.studies||!studies.studies.length) continue;
        const studyName=studies.studies[0].study_name;
        let all=[],offset=0;
        while(true){
          const batch=await api('/api/breeders/'+id+'/trials/'+encodeURIComponent(studyName)+'?offset='+offset+'&limit=500');
          all=all.concat(batch.trials);
          if(batch.trials.length<500) break;
          offset+=500;
        }
        trialList=all.filter(t=>t.state==='COMPLETE');
        trialList.sort((a,b)=>a.datetime_start<b.datetime_start?-1:1);
        if(studies.studies[0].directions){
          config._directions=studies.studies[0].directions;
          if(config.objectives) config.objectives.forEach((obj,i)=>{
            if(config._directions[i]) obj.direction=config._directions[i].toLowerCase();
          });
        }
      }
      const qualities=trialList?trialList.map(t=>{
        if(!config.objectives||!config.objectives.length) return Math.random();
        let sum=0,cnt=0;
        config.objectives.forEach((_,i)=>{
          const v=t.values?t.values[i]:null;
          if(v!==null&&v!==undefined){
            const vals=trialList.map(tt=>tt.values?tt.values[i]:null).filter(x=>x!==null);
            const mn=d3.min(vals),mx=d3.max(vals),rng=mx-mn||1;
            const norm=(v-mn)/rng;
            sum+=(config._directions&&config._directions[i]==='MINIMIZE')?1-norm:norm;
            cnt++;
          }
        });
        return cnt?sum/cnt:0;
      }):[];
      const perObjQualities=config.objectives?config.objectives.map((_,oi)=>{
        return trialList?trialList.map(t=>{
          const v=t.values?t.values[oi]:null;
          if(v===null||v===undefined) return null;
          const vals=trialList.map(tt=>tt.values?tt.values[oi]:null).filter(x=>x!==null);
          const mn=d3.min(vals),mx=d3.max(vals),rng=mx-mn||1;
          const norm=(v-mn)/rng;
          return (config._directions&&config._directions[oi]==='MINIMIZE')?1-norm:norm;
        }):[];
      }):[];
      const times=trialList?trialList.map(t=>new Date(t.datetime_start).getTime()/1000):[];
      breeders.push({
        id,name:config.name||id,config,
        trials:trialList||[],qualities,perObjQualities,times,
        trialCount:trialList?trialList.length:0
      });
    }
    if(breeders.length<2){
      el.html('<div class="error">need at least 2 breeders with trials for cross-examination</div>');
      return;
    }
    if(DEMO){
      // Use DEMO_DATA — single source of truth
      breeders.length=0;
      for(let b=0;b<DEMO_DATA.breeders.length;b++){
        const db=DEMO_DATA.breeders[b];
        const cfg={...DEMO_DATA.config,name:db.name};
        const bTrials=DEMO_DATA.trials[b];
        const qualities=bTrials.map(t=>{
          let sum=0,cnt=0;
          (t.values||[]).forEach((v,i)=>{
            if(v!=null){
              const vals=bTrials.map(tt=>tt.values?tt.values[i]:null).filter(x=>x!==null);
              const mn=d3.min(vals),mx=d3.max(vals),rng=mx-mn||1;
              const norm=(v-mn)/rng;
              sum+=(cfg._directions&&cfg._directions[i]==='MINIMIZE')?1-norm:norm;
              cnt++;
            }
          });
          return cnt?sum/cnt:0;
        });
        const perObjQualities=cfg.objectives.map((_,oi)=>{
          return bTrials.map(t=>{
            const v=t.values?t.values[oi]:null;
            if(v===null||v===undefined) return null;
            const vals=bTrials.map(tt=>tt.values?tt.values[oi]:null).filter(x=>x!==null);
            const mn=d3.min(vals),mx=d3.max(vals),rng=mx-mn||1;
            const norm=(v-mn)/rng;
            return (cfg._directions&&cfg._directions[oi]==='MINIMIZE')?1-norm:norm;
          });
        });
        const times=bTrials.map(t=>new Date(t.datetime_start).getTime()/1000);
        breeders.push({
          id:db.id,name:db.name,config:cfg,
          trials:bTrials,qualities,perObjQualities,times,
          trialCount:bTrials.length
        });
      }
    }
        crossData=breeders;
    wmDetections=null;
    status('cross-examining '+breeders.length+' breeders');
    renderCross();
  }catch(e){
    el.html('<div class="error">'+e.message+'</div>');
    status('error: '+e.message);
  }
}

function crossTierBg(t){return t==='detected'?'rgba(248,81,73,0.15)':t==='not_detected'?'rgba(63,185,80,0.12)':'rgba(139,148,158,0.08)'}

function crossQ(t){
  if(breederConfig) return trialQuality(t);
  if(t.values&&t.values[0]!=null) return Math.max(0,Math.min(1,t.values[0]));
  return 0;
}

// Parse watermark metadata and return whether this trial is an active impulse probe.
// The breeder stamps watermark config on every trial, but only actual impulse probes
// have {active: true}. Free trials have the config without active, or watermark="off".
function isActiveImpulse(t) {
  if (!t || !t.user_attrs) return false;
  const wm = t.user_attrs.watermark;
  if (!wm || wm === 'off') return false;
  let parsed = wm;
  if (typeof wm === 'string') { try { parsed = JSON.parse(wm); } catch(e) { return false; } }
  return parsed && parsed.active === true;
}



function addDemoPerObj(d){
  if(!d.per_objective)d.per_objective=[{objective_index:0,detected:d.detected,method:'impulse_stacking',stacked_mean:0.5,baseline_mean:0.48,baseline_std:0.04,shift:0.02,snr:d.detected?3.5:0.4,post_impulse_samples:12,baseline_samples:88,impulses_used:d.impulse_count||4}];
  d.per_objective.forEach(po=>{
    if(po.impulse_timeline)return;
    // Build mock impulse timeline for visualization
    var n=d.sender_trials||100;
    var period=d.watermark&&d.watermark.period||50;
    var impulsePositions=[];
    for(var t=0;t<n;t+=period) impulsePositions.push(t);
    // For each trial position, generate mock receiver values
    var baseVal=po.baseline_mean||0.5;
    var shift=po.shift||(po.detected?0.15:0.01);
    po.impulse_timeline=Array.from({length:n},function(_,i){
      var isPostImpulse=impulsePositions.some(function(p){return i>=p&&i<p+3;});
      if(isPostImpulse) return +(baseVal+shift+(Math.random()-0.5)*0.02).toFixed(4);
      return +(baseVal+(Math.random()-0.5)*0.04).toFixed(4);
    });
    po.impulse_positions=impulsePositions;
  });
  return d;
}
  Object.values(DEMO_DATA.detections).forEach(addDemoPerObj);

async function fetchWmDetections(){
  const results={};
  for(let i=0;i<crossData.length;i++){
    for(let j=0;j<crossData.length;j++){
      if(i===j) continue;
      const a=crossData[i],b=crossData[j];
      const key=a.name+'::'+b.name;
      if(DEMO){
        const dk=Object.keys(DEMO_DATA.detections).find(k=>(a.name+'::'+b.name)===k);
        if(dk) results[key]=DEMO_DATA.detections[dk];
        else{console.log('DEMO_WM miss:',key,'a.name=',a.name,'b.name=',b.name); results[key]={detected:false,method:'impulse_stacking',impulse_count:0,impulses_used:0,best_snr:0,per_objective:[]};}
      } else {
        try{
          const r=await fetch(baseUrl+'/api/watermark-detection/'+a.id+'/'+b.id);
          results[key]=await r.json();
        }catch(e){
          results[key]={detected:false,method:'impulse_stacking',impulse_count:0,impulses_used:0,best_snr:0,error:true};
        }
      }
    }
  }
  return results;
}

async function renderCross(){
  if(!crossData||crossData.length<2) return;
  const el=d3.select('#content');
  el.html('');

  const hdr=el.append('div').style('display','flex').style('align-items','center').style('gap','8px').style('margin-bottom','8px');
  crossData.forEach((b,i)=>{
    if(i>0) hdr.append('span').style('color','#484f58').style('font-size','11px').text('\u00d7');
    hdr.append('span').style('background','#1c2128').style('border','1px solid #30363d').style('border-radius','4px')
      .style('padding','4px 10px').style('font-size','11px').style('color','#3fb950').text(b.name+' ('+b.trialCount+')');
  });

  if(!wmDetections){
    el.append('div').style('color','#8b949e').style('margin-bottom','8px').text('detecting interference...');
    wmDetections=await fetchWmDetections();
    renderCross();
    return;
  }

  const hasAnyWatermark=crossData.some(b=>b.trials.some(t=>t.user_attrs&&t.user_attrs.watermark));

  const tabs=el.append('div').attr('class','cross-tabs');
  tabs.append('button').classed('active',crossView==='ranked').text('ranked').on('click',()=>{crossView='ranked';renderCross()});
  tabs.append('button').classed('active',crossView==='matrix').text('matrix').on('click',()=>{crossView='matrix';renderCross()});
  tabs.append('button').classed('active',crossView==='causality').text('causality').on('click',()=>{crossView='causality';renderCross()});
  tabs.append('button').classed('active',crossView==='interference').text('interference').on('click',()=>{crossView='interference';renderCross()});

  if(hasAnyWatermark){
    const wmOn=crossData.reduce((n,b)=>n+b.trials.filter(t=>isActiveImpulse(t)).length,0);
    const wmOff=crossData.reduce((n,b)=>n+b.trials.filter(t=>!isActiveImpulse(t)).length,0);
    const detected=Object.values(wmDetections).filter(d=>d.detected).length;
    const total=Object.keys(wmDetections).length;
    const sum=el.append('div').style('margin-bottom','10px').style('font-size','10px').style('color','#6e7681');
    const sampleWm=crossData.find(b=>b.trials.some(t=>t.user_attrs&&t.user_attrs.watermark&&typeof t.user_attrs.watermark==='string'&&t.user_attrs.watermark.includes('{')));
    const wmType=sampleWm?(() => { try { return JSON.parse(sampleWm.trials.find(t=>t.user_attrs&&t.user_attrs.watermark&&typeof t.user_attrs.watermark==='string'&&t.user_attrs.watermark.includes('{')).user_attrs.watermark).type } catch(e) { return 'on_off' } })() : 'on_off';
    if(wmType==='impulse'){
      sum.text(crossData.length+' breeders \u2014 '+wmOn+' impulse probes, '+wmOff+' free \u2014 '+detected+'/'+total+' directions detected (impulse stacking)');
    } else {
      sum.text(crossData.length+' breeders — '+wmOn+' impulse probes, '+wmOff+' free trials — '+detected+'/'+total+' directions detected');
    }
  } else {
    el.append('div').attr('class','info').style('margin-bottom','8px').text('no interference data — impulse probing activates automatically when neighbors are detected');
  }

  if(crossView==='ranked') renderCrossRanked(el);
  else if(crossView==='matrix') renderCrossMatrix(el);
  else if(crossView==='interference') renderCrossInterference(el);
  else renderCrossCausality(el);

  el.append('div').attr('class','cross-pair-detail').attr('id','crossPairDetail');
}

function renderCrossRanked(el){
  const rows=[];
  for(let i=0;i<crossData.length;i++){
    for(let j=0;j<crossData.length;j++){
      if(i===j) continue;
      const a=crossData[i],b=crossData[j];
      const key=a.name+'::'+b.name;
      const d=wmDetections[key];
      if(!d) continue;
      rows.push({from:a.name,to:b.name,fromIdx:i,toIdx:j,key,d});
    }
  }

  const maxCorr=d3.max(rows,r=>r.d.best_snr)||0.5;

  const cols=[
    {key:'direction',w:'200px',field:'name'},
    {key:'verdict',w:'80px',field:'verdict'},
    {key:'snr',w:'100px',field:'snr'},
    {key:'method',w:'120px',field:'method'},
    {key:'impulses',w:'60px',field:'impulses'},
    {key:'shift',w:'70px',field:'shift'},
    {key:'trials',w:'70px',field:'trials'},
  ];

  const hdr=el.append('div').attr('class','cross-ranked-header');
  cols.forEach(col=>{
    const h=hdr.append('span').style('width',col.w).style('flex-shrink','0').style('overflow','hidden');
    if(col.field===wmSort) h.attr('class','cross-ranked-header sorted');
    h.text(col.key);
    if(col.field===wmSort) h.append('span').style('margin-left','3px').style('font-size','8px').text(wmSortDir===-1?'\u25BC':'\u25B2');
    h.on('click',()=>{
      if(wmSort===col.field) wmSortDir*=-1;
      else{wmSort=col.field;wmSortDir=-1}
      renderCross();
    });
  });

  function doSort(items){
    return items.slice().sort((a,b)=>{
      if(wmSort==='name') return wmSortDir*(a.from+a.to).localeCompare(b.from+b.to);
      if(wmSort==='verdict'){const tw=d=>d.d.detected?2:1;return wmSortDir*(tw(a)-tw(b))}
      if(wmSort==='snr') return wmSortDir*((a.d.best_snr||0)-(b.d.best_snr||0));
      if(wmSort==='method') return wmSortDir*((a.d.method||'').localeCompare(b.d.method||''));
      if(wmSort==='impulses') return wmSortDir*((a.d.impulses_used||0)-(b.d.impulses_used||0));
      if(wmSort==='shift'){const sa=d3.mean((a.d.per_objective||[]).map(o=>Math.abs(o.shift||0)))||0;const sb=d3.mean((b.d.per_objective||[]).map(o=>Math.abs(o.shift||0)))||0;return wmSortDir*(sa-sb);}
      if(wmSort==='trials') return wmSortDir*((a.d.impulse_count||0)-(b.d.impulse_count||0));
      return 0;
    });
  }

  doSort(rows).forEach(r=>{
    const d=r.d;
    const row=el.append('div').attr('class','cross-ranked-row').style('cursor','pointer');
    row.append('span').style('width','200px').style('white-space','nowrap').style('overflow','hidden').style('text-overflow','ellipsis')
      .style('font','11px monospace').style('color','#c9d1d9').style('flex-shrink','0').text(r.from+' \u2192 '+r.to);

    const tier=d.detected?'detected':'not_detected';
    // SNR bar — green past threshold, red below
    const snrVal=d.best_snr||0;
    const snrMax=Math.max(maxCorr,snrVal,2.5);
    const bar=row.append('span').style('width','100px').style('height','6px').style('background','#21262d')
      .style('border-radius','3px').style('overflow','hidden').style('flex-shrink','0').style('position','relative');
    bar.append('span').style('display','block').style('height','100%')
      .style('width',Math.min(snrVal/snrMax*100,100)+'%').style('background',crossTierColor(tier)).style('border-radius','3px');
    // Threshold marker
    bar.append('span').style('position','absolute').style('left',(2.5/snrMax*100)+'%').style('top','0').style('height','100%').style('width','1px').style('background','#58a6ff').style('opacity','0.6');

    row.append('span').style('width','80px').style('font','9px monospace').style('color',crossTierColor(tier)).style('flex-shrink','0')
      .text(d.detected?'detected':'not detected');
    row.append('span').style('width','120px').style('font','9px monospace').style('color','#8b949e').style('flex-shrink','0')
      .text(d.method||'\\u2014');
    row.append('span').style('width','60px').style('font','9px monospace').style('color','#8b949e').style('flex-shrink','0').style('text-align','center')
      .text((d.impulses_used||0)+'/'+(d.impulse_count||0));
    row.append('span').style('width','70px').style('font','9px monospace').style('color',crossTierColor(tier)).style('flex-shrink','0').style('text-align','center')
      .text('snr '+snrVal.toFixed(1));
    row.append('span').style('width','70px').style('font','9px monospace').style('color','#6e7681').style('flex-shrink','0').style('text-align','center')
      .text(d.sender_trials||0);

    row.on('click',()=>showWmPairDetail(r));
  });
}

        .on('mouseleave',function(){d3.select(this).select('rect').attr('stroke-width',1.5);hideTip()});
      } else {
        g.append('rect').attr('x',cx+2).attr('y',cy+2).attr('width',cellSize-4).attr('height',cellSize-4)
          .attr('fill','#0d1117').attr('rx',3).attr('stroke','#21262d').attr('stroke-width',1);
        g.append('text').attr('x',cx+cellSize/2).attr('y',cy+30).attr('text-anchor','middle')
          .attr('fill','#484f58').style('font','9px monospace').text('no data');
      }
    }
  }
}

function renderCrossCausality(el){
  const edges=[];
  Object.entries(wmDetections||{}).forEach(([key,d])=>{
    if(!d.detected) return;
    const [from,to]=key.split('::');
    edges.push({from,to,strength:d.best_snr||0,tier:'detected',method:d.method||'impulse_stacking',lag:d.impulses_used||0,d});
  });

  const fromMap={};
  edges.forEach(e=>{if(!fromMap[e.from])fromMap[e.from]=[];fromMap[e.from].push(e)});
  const outSum={},inSum={};
  edges.forEach(e=>{outSum[e.from]=(outSum[e.from]||0)+e.strength;inSum[e.to]=(inSum[e.to]||0)+e.strength});
  const maxImpact=d3.max([...Object.values(outSum),...Object.values(inSum)])||1;

  function nodeColor(name){
    const out=(outSum[name]||0),inc=(inSum[name]||0);
    if(out>inc) return d3.interpolateRgb('#30363d','#3fb950')(Math.min(out/maxImpact,1));
    if(inc>0) return d3.interpolateRgb('#30363d','#f0883e')(Math.min(inc/maxImpact,1));
    return '#484f58';
  }

  el.append('div').style('font-size','10px').style('color','#6e7681').style('margin-bottom','10px')
    .html('nodes colored by impact: <span style="color:#3fb950">causes interference</span> | <span style="color:#f0883e">affected by interference</span> | <span style="color:#484f58">isolated</span> | hover nodes and edges for detail');

  if(!edges.length){
    el.append('div').attr('class','info').text('no detected interference edges found \u2014 check the ranked/matrix tabs for details');
    return;
  }

  const subTabs=el.append('div').attr('id','causalitySubTabs').style('display','flex').style('gap','8px').style('margin-bottom','12px');
  let causalitySub='reach';
  function highlightSubTabs(){
    subTabs.selectAll('button')
      .style('background',function(){return d3.select(this).datum()===causalitySub?'#238636':'#21262d'})
      .style('color',function(){return d3.select(this).datum()===causalitySub?'#fff':'#8b949e'});
  }
  subTabs.append('button').datum('reach').style('border','none')
    .style('padding','3px 10px').style('border-radius','3px').style('cursor','pointer').style('font-family','inherit').style('font-size','11px')
    .text('reachability trees').on('click',function(){causalitySub='reach';highlightSubTabs();d3.select('#causalityContent').html('');renderCausalityContent()});
  subTabs.append('button').datum('sankey').style('border','none')
    .style('padding','3px 10px').style('border-radius','3px').style('cursor','pointer').style('font-family','inherit').style('font-size','11px')
    .text('sankey flow').on('click',function(){causalitySub='sankey';highlightSubTabs();d3.select('#causalityContent').html('');renderCausalityContent()});
  subTabs.append('button').datum('topo').style('border','none')
    .style('padding','3px 10px').style('border-radius','3px').style('cursor','pointer').style('font-family','inherit').style('font-size','11px')
    .text('topological layers').on('click',function(){causalitySub='topo';highlightSubTabs();d3.select('#causalityContent').html('');renderCausalityContent()});
  highlightSubTabs();

  const cEl=el.append('div').attr('id','causalityContent');

  function renderCausalityContent(){
    cEl.html('');
    const pd=d3.select('#crossPairDetail');if(pd.size()){pd.classed('show',false);pd.html('')}
    if(causalitySub==='reach') renderReach(cEl);
    else if(causalitySub==='sankey') renderSankeyView(cEl);
    else renderTopoView(cEl);
  }
  renderCausalityContent();

  function buildDag(edgeList){
    const pairBest={};
    edgeList.forEach(e=>{
      const key=[e.from,e.to].sort().join('::');
      if(!pairBest[key]||e.strength>pairBest[key].strength) pairBest[key]=e;
    });
    const dag=[...Object.values(pairBest)].sort((a,b)=>b.strength-a.strength);
    const adj={};dag.forEach(e=>{if(!adj[e.from])adj[e.from]=[];adj[e.from].push(e.to)});
    const visited=new Set(),stack=new Set();
    function hasCycle(n){if(stack.has(n))return true;if(visited.has(n))return false;visited.add(n);stack.add(n);for(const c of(adj[n]||[]))if(hasCycle(c))return true;stack.delete(n);return false}
    while(dag.length>1){
      visited.clear();stack.clear();
      let cycle=false;
      for(const n of new Set(dag.flatMap(e=>[e.from,e.to]))){if(hasCycle(n)){cycle=true;break}}
      if(!cycle) break;
      dag.pop();
      Object.keys(adj).forEach(k=>delete adj[k]);
      dag.forEach(e=>{if(!adj[e.from])adj[e.from]=[];adj[e.from].push(e.to)});
    }
    return dag;
  }

  function renderReach(container){
    const dag=buildDag(edges);
    const dagFrom={};
    dag.forEach(e=>{if(!dagFrom[e.from])dagFrom[e.from]=[];dagFrom[e.from].push(e)});
    const grid=container.append('div').style('display','grid').style('grid-template-columns','repeat(auto-fill,minmax(280px,1fr))').style('gap','12px');
    crossData.forEach(b=>{
      const card=grid.append('div').attr('class','cross-tree-card');
      const hdr=card.append('div').style('display','flex').style('align-items','center').style('gap','6px').style('margin-bottom','6px');
      hdr.append('span').style('width','8px').style('height','8px').style('border-radius','2px').style('background',nodeColor(b.name)).style('flex-shrink','0');
      hdr.append('span').style('font','bold 10px monospace').style('color','#c9d1d9').text(b.name);
      const outE=dag.filter(e=>e.from===b.name);
      const inE=dag.filter(e=>e.to===b.name);
      hdr.append('span').style('font','9px monospace').style('color','#6e7681')
        .text(outE.length?outE.length+' out':'sink');
      if(!outE.length){
        card.append('div').style('font','9px monospace').style('color','#484f58').style('padding-left','14px')
          .text(inE.length?'sink \u2014 receives only':'isolated');
        return;
      }
      function buildLevel(parent,name,visited){
        const kids=dagFrom[name]||[];
        kids.forEach((e,ei)=>{
          if(visited.has(e.to)){
            if(ei<2) parent.append('div').style('padding','2px 0 2px 14px').style('border-left','1px solid #21262d').style('margin-left','8px')
              .append('span').style('font','8px monospace').style('color','#6e7681').text('\u21A9 '+e.to);
            else if(ei===2) parent.append('div').style('padding','2px 0 2px 14px').style('border-left','1px solid #21262d').style('margin-left','8px')
              .append('span').style('font','8px monospace').style('color','#484f58').text('\u21A9 +'+(kids.length-ei)+' more');
            return;
          }
          const row=parent.append('div').style('display','flex').style('align-items','center').style('gap','4px')
            .style('padding','2px 0 2px 14px').style('border-left','1px solid #21262d').style('margin-left','8px').style('cursor','pointer');
          const grandKids=(dagFrom[e.to]||[]).filter(c=>!visited.has(c.to));
          if(grandKids.length){
            const toggle=row.append('span').style('font','8px monospace').style('color','#6e7681').style('cursor','pointer').style('user-select','none').text('\u25B6');
            const childWrap=parent.append('div').style('display','none');
            buildLevel(childWrap,e.to,new Set([...visited,e.to]));
            toggle.on('click',function(ev){
              ev.stopPropagation();
              if(childWrap.style('display')==='none'){childWrap.style('display','block');d3.select(this).text('\u25BC')}
              else{childWrap.style('display','none');d3.select(this).text('\u25B6')}
            });
          }
          row.append('span').style('font','8px monospace').style('color',crossTierColor(e.tier)).text((e.strength*100).toFixed(0)+'%');
          row.append('span').style('font','9px monospace').style('color','#c9d1d9').text(e.to);
          row.on('click',()=>showWmPairDetail({from:e.from,to:e.to,fromIdx:crossData.findIndex(b=>b.name===e.from),toIdx:crossData.findIndex(b=>b.name===e.to),key:e.from+'::'+e.to,d:e.d}));
          row.on('mouseenter',function(ev){showTip('<div class="tt-title">'+e.from+' \u2192 '+e.to+'</div><div class="tt-line">correlation: <span>'+e.strength.toFixed(3)+'</span></div><div class="tt-line">method: <span>'+(e.method||'\u2014')+'</span></div>',ev.clientX,ev.clientY)})
            .on('mouseleave',hideTip);
        });
      }
      buildLevel(card,b.name,new Set([b.name]));
    });
  }

  function renderSankeyView(container){
    if(typeof d3.sankey==='undefined'){container.append('div').attr('class','error').text('d3-sankey library not loaded (needs network)');return}
    const dag=buildDag(edges);
    if(dag.length<1){container.append('div').attr('class','info').text('no acyclic edges for sankey layout');return}
    try{
      const size=Math.min(700,window.innerWidth-80);
      const margin={top:10,right:20,bottom:10,left:20};
      const w=size-margin.left-margin.right,h=400-margin.top-margin.bottom;
      const svg=container.append('svg').attr('width',size).attr('height',400).style('display','block').style('margin','10px auto');
      const nodeNames=[...new Set(dag.flatMap(e=>[e.from,e.to]))];
      const ni={};nodeNames.forEach((n,i)=>ni[n]=i);
      const sd={
        nodes:nodeNames.map((name,i)=>({id:i,name,color:nodeColor(name)})),
        links:dag.map(e=>({source:ni[e.from],target:ni[e.to],value:Math.max(e.strength*100,5),strength:e.strength,tier:e.tier,from:e.from,to:e.to,d:e.d}))
      };
      const res=d3.sankey().nodeId(d=>d.id).nodeWidth(16).nodePadding(20)
        .extent([[margin.left,margin.top],[w+margin.left,h+margin.top]])(sd);
      svg.append('g').selectAll('path').data(res.links).join('path')
        .attr('d',d3.sankeyLinkHorizontal()).attr('fill','none')
        .attr('stroke',d=>crossTierColor(d.tier)).attr('stroke-opacity',0.4)
        .attr('stroke-width',d=>Math.max(2,d.value/4))
        .style('cursor','pointer')
        .on('mouseenter',function(ev,d){d3.select(this).attr('stroke-opacity',0.8);showTip(d.source.name+' \u2192 '+d.target.name+' ('+(d.strength*100).toFixed(0)+'%)',ev.clientX,ev.clientY)})
        .on('mouseleave',function(){d3.select(this).attr('stroke-opacity',0.4);hideTip()})
        .on('click',(ev,d)=>showWmPairDetail({from:d.from,to:d.to,fromIdx:crossData.findIndex(b=>b.name===d.from),toIdx:crossData.findIndex(b=>b.name===d.to),key:d.from+'::'+d.to,d:d.d}));
      const ng=svg.append('g').selectAll('g').data(res.nodes).join('g');
      ng.append('rect').attr('x',d=>d.x0).attr('y',d=>d.y0).attr('width',d=>d.x1-d.x0).attr('height',d=>Math.max(1,d.y1-d.y0))
        .attr('fill',d=>d.color).attr('rx',3).attr('stroke','#30363d');
      ng.append('text').attr('x',d=>d.x0>size/2?d.x0-6:d.x1+6).attr('y',d=>(d.y0+d.y1)/2+4)
        .attr('text-anchor',d=>d.x0>size/2?'end':'start').attr('fill','#c9d1d9').style('font','9px monospace').text(d=>d.name);
      ng.style('cursor','pointer').on('mouseenter',function(ev,d){
        showTip(d.name+' \u2014 affects '+dag.filter(e=>e.from===d.name).length+', affected by '+dag.filter(e=>e.to===d.name).length,ev.clientX,ev.clientY);
      }).on('mouseleave',hideTip);
    }catch(err){
      container.append('div').attr('class','error').text('sankey layout failed: '+err.message);
    }
  }

  function renderTopoView(container){
    const dag=buildDag(edges);
    const targets=new Set(dag.map(e=>e.to)),sources=new Set(dag.map(e=>e.from));
    const l0=[],l1=[],l2=[],lIso=[];
    crossData.forEach(b=>{
      const isS=sources.has(b.name),isT=targets.has(b.name);
      if(!isS&&!isT)lIso.push(b.name);
      else if(isS&&!isT)l0.push(b.name);
      else if(!isS&&isT)l2.push(b.name);
      else l1.push(b.name);
    });
    const layers=l1.length>0?[l0,l1,l2]:[l0,l2];
    const labels=l1.length>0?['sources','intermediaries','sinks']:['sources','sinks'];
    const size=Math.min(700,window.innerWidth-80);
    const layerH=120,totalH=layers.length*layerH+(lIso.length?60:0)+40;
    const svg=container.append('svg').attr('width',size).attr('height',totalH).style('display','block').style('margin','10px auto');
    const pos={};
    layers.forEach((layer,li)=>{
      const y=20+li*layerH+layerH/2;
      const gap=size/(layer.length+1);
      layer.forEach((b,bi)=>{pos[b]={x:gap*(bi+1),y}});
      svg.append('text').attr('x',10).attr('y',20+li*layerH+14).attr('fill','#484f58').style('font','9px monospace').text(labels[li]);
    });
    if(lIso.length){
      const isoY=20+layers.length*layerH;
      svg.append('text').attr('x',10).attr('y',isoY+14).attr('fill','#484f58').style('font','9px monospace').text('isolated');
      const isoGap=size/(lIso.length+1);
      lIso.forEach((b,bi)=>{pos[b]={x:isoGap*(bi+1),y:isoY+30}});
    }
    const defs=svg.append('defs');
    ['coupled','not_coupled','inconclusive'].forEach(t=>{const c=crossTierColor(t);defs.append('marker').attr('id','ct-'+t).attr('viewBox','0 0 10 10')
      .attr('refX',10).attr('refY',5).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
      .append('path').attr('d','M 0 1 L 10 5 L 0 9 z').attr('fill',c)});
    const eG=svg.append('g');
    dag.forEach(e=>{
      const f=pos[e.from],t=pos[e.to];if(!f||!t) return;
      const dy=Math.abs(f.y-t.y);
      if(dy<5){
        const mx=(f.x+t.x)/2,my=f.y-45;
        eG.append('path').attr('d','M '+f.x+','+(f.y-14)+' Q '+mx+','+my+' '+t.x+','+(t.y-14)).attr('fill','none')
          .attr('stroke',crossTierColor(e.tier)).attr('stroke-width',1+e.strength*3).attr('opacity',0.5)
          .attr('marker-end','url(#ct-'+e.tier+')').style('cursor','pointer')
          .on('mouseenter',function(ev){d3.select(this).attr('opacity',1);showTip(e.from+' \u2192 '+e.to+' ('+(e.strength*100).toFixed(0)+'%)',ev.clientX,ev.clientY)})
          .on('mouseleave',function(){d3.select(this).attr('opacity',0.5);hideTip()})
          .on('click',()=>showWmPairDetail({from:e.from,to:e.to,fromIdx:crossData.findIndex(b=>b.name===e.from),toIdx:crossData.findIndex(b=>b.name===e.to),key:e.from+'::'+e.to,d:e.d}));
      } else {
        eG.append('line').attr('x1',f.x).attr('y1',f.y+15).attr('x2',t.x).attr('y2',t.y-15)
          .attr('stroke',crossTierColor(e.tier)).attr('stroke-width',1+e.strength*3).attr('opacity',0.5)
          .attr('marker-end','url(#ct-'+e.tier+')').style('cursor','pointer')
          .on('mouseenter',function(ev){d3.select(this).attr('opacity',1);showTip(e.from+' \u2192 '+e.to+' ('+(e.strength*100).toFixed(0)+'%)',ev.clientX,ev.clientY)})
          .on('mouseleave',function(){d3.select(this).attr('opacity',0.5);hideTip()})
          .on('click',()=>showWmPairDetail({from:e.from,to:e.to,fromIdx:crossData.findIndex(b=>b.name===e.from),toIdx:crossData.findIndex(b=>b.name===e.to),key:e.from+'::'+e.to,d:e.d}));
      }
    });
    const nG=svg.append('g');
    crossData.forEach(b=>{
      const p=pos[b.name];if(!p) return;
      const g=nG.append('g').style('cursor','pointer');
      g.append('rect').attr('x',p.x-50).attr('y',p.y-14).attr('width',100).attr('height',28)
        .attr('fill','#161b22').attr('stroke',nodeColor(b.name)).attr('stroke-width',1.5).attr('rx',4);
      g.append('text').attr('x',p.x).attr('y',p.y+4).attr('text-anchor','middle').attr('fill','#c9d1d9')
        .style('font','9px monospace').text(b.name.length>14?b.name.substring(0,12)+'..':b.name);
      g.on('mouseenter',function(ev){
        const oe=dag.filter(e=>e.from===b.name),ie=dag.filter(e=>e.to===b.name);
        showTip(b.name+' \u2014 affects '+oe.length+', affected by '+ie.length,ev.clientX,ev.clientY);
      }).on('mouseleave',hideTip);
    });
  }
}


function renderCrossInterference(el){
  const pairs=[];
  for(let i=0;i<crossData.length;i++){
    for(let j=0;j<crossData.length;j++){
      if(i!==j) pairs.push({a:crossData[i],b:crossData[j]});
    }
  }
  if(!pairs.length){
    el.append('div').attr('class','info').text('need at least 2 breeders');
    return;
  }

  const anyWatermark=crossData.some(b=>b.trials.some(t=>t.user_attrs&&t.user_attrs.watermark));
  if(!anyWatermark){
    el.append('div').attr('class','info').text('no interference data — impulse probing activates automatically when neighbors are detected');
    return;
  }

  el.append('div').attr('class','info').style('margin-bottom','12px')
    .text('interference overlay — per-objective quality traces with impulse probe shading');

  const sampleB=crossData.find(b=>b.trials.some(t=>t.user_attrs&&t.user_attrs.watermark));
  const allObjNames=sampleB&&sampleB.config&&sampleB.config.objectives?sampleB.config.objectives.map(o=>o.name):[];
  const objCount=allObjNames.length;

  if(objCount>1){
    const objBar=el.append('div').style('margin-bottom','10px').style('display','flex').style('gap','4px').style('align-items','center');
    objBar.append('span').style('font','9px monospace').style('color','#8b949e').text('objective:');
    allObjNames.forEach((oName,oi)=>{
      objBar.append('button').attr('class','cross-interf-global-obj').attr('data-oi',oi)
        .style('font','9px monospace').style('padding','2px 8px')
        .style('border','1px solid #30363d').style('border-radius','3px')
        .style('background',oi===0?'#21262d':'transparent')
        .style('color',oi===0?'#c9d1d9':'#6e7681').style('cursor','pointer').text(oName)
        .on('click',function(){
          objBar.selectAll('.cross-interf-global-obj').style('background','transparent').style('color','#6e7681');
          d3.select(this).style('background','#21262d').style('color','#c9d1d9');
          const newOi=+d3.select(this).attr('data-oi');
          el.selectAll('.interf-trace-container').each(function(){
            d3.select(this).html('');
            const bIdx=+d3.select(this).attr('data-bidx');
            renderInterferenceTraceOverlay(d3.select(this),crossData[bIdx],newOi);
          });
        });
    });
  }

  crossData.forEach((b,bIdx)=>{
    const wmTrials=b.trials.filter(t=>t.user_attrs&&t.user_attrs.watermark);
    if(!wmTrials.length) return;

    const section=el.append('div').style('margin-bottom','16px')
      .style('padding','12px').style('background','#0d1117')
      .style('border','1px solid #21262d').style('border-radius','6px');

    section.append('div').style('font','bold 11px monospace').style('color','#c9d1d9').style('margin-bottom','4px')
      .text(b.name);
    const container=section.append('div').attr('class','interf-trace-container').attr('data-bidx',bIdx);
    renderInterferenceTraceOverlay(container,b,0);
  });
}

function renderInterferenceTraceOverlay(parent,breeder,selObjIdx){
  const objs=breeder.config?breeder.config.objectives:[{name:'quality'}];
  const trials=breeder.trials;
  if(!trials.length) return;
  const objIdx=selObjIdx!=null?selObjIdx:0;

  const margin={top:28,right:20,bottom:30,left:50};
  const fullWidth=Math.min(900,window.innerWidth-60);
  const width=fullWidth-margin.left-margin.right;
  const height=180-margin.top-margin.bottom;

  const activeFill='rgba(63,185,80,0.06)';
  const activeBorder='rgba(63,185,80,0.2)';

  const svg=parent.append('svg').attr('width',fullWidth).attr('height',180)
    .style('display','block').style('margin','4px 0');
  const g=svg.append('g').attr('transform','translate('+margin.left+','+margin.top+')');

  const allTimes=breeder.times||trials.map((_,i)=>i);
  const tMin=d3.min(allTimes),tMax=d3.max(allTimes);
  const x=d3.scaleLinear().domain([tMin,tMax]).range([0,width]);

  const perObjQ=breeder.perObjQualities&&breeder.perObjQualities[objIdx]?breeder.perObjQualities[objIdx]:breeder.qualities;
  const objValues=trials.map(t=>t.values&&t.values[objIdx]!=null?t.values[objIdx]:null);
  const useRaw=trials.some(t=>t.values&&t.values[objIdx]!=null);
  const qVals=useRaw?objValues.filter(q=>q!=null&&isFinite(q)):perObjQ.filter(q=>q!=null&&isFinite(q));
  if(!qVals.length) return;
  const qMin=d3.min(qVals),qMax=d3.max(qVals);
  const qPad=(qMax-qMin)*0.1||0.05;
  const y=d3.scaleLinear().domain([qMin-qPad,qMax+qPad]).range([height,0]);

  const wmMeta=trials.find(t=>t.user_attrs&&t.user_attrs.watermark&&typeof t.user_attrs.watermark==='string'&&t.user_attrs.watermark.includes('{'));
  const wmType=wmMeta?(() => { try { return JSON.parse(wmMeta.user_attrs.watermark).type } catch(e) { return 'unknown' } })() : 'unknown';

  if(wmType==='on_off'){
    const wmRanges=[];
    let curRange=null;
    trials.forEach((t,i)=>{
      const wm=t.user_attrs&&t.user_attrs.watermark;
      const isOff=!wm||wm==='off';
      if(curRange===null){
        curRange={start:i,end:i,isOff:isOff};
      } else if(isOff!==curRange.isOff){
        wmRanges.push(curRange);
        curRange={start:i,end:i,isOff:isOff};
      } else {
        curRange.end=i;
      }
    });
    if(curRange!==null) wmRanges.push(curRange);

    wmRanges.forEach(range=>{
      const s=range.isOff?null:activeBorder;
      const f=range.isOff?'rgba(88,166,255,0.03)':activeFill;
      const sx=x(allTimes[range.start]),ex=x(allTimes[range.end])+1;
      g.append('rect').attr('x',sx).attr('y',0).attr('width',Math.max(ex-sx,2)).attr('height',height)
        .attr('fill',f).style('pointer-events','none');
      if(s){
        g.append('line').attr('x1',sx).attr('y1',0).attr('x2',sx).attr('y2',height)
          .attr('stroke',s).attr('stroke-width',1).attr('stroke-dasharray','2,3').style('pointer-events','none');
      }
    });
  } else if((wmType==='sinusoidal'||wmType==='impulse')){
    const wmInfo=wmMeta?JSON.parse(wmMeta.user_attrs.watermark):{};
    const paramName=(wmInfo.params&&wmInfo.params[0]&&wmInfo.params[0].param_name)||'';
    const dutyCycle=wmInfo.duty_cycle||0.02;
    const amplitude=(wmInfo.params&&wmInfo.params[0]&&wmInfo.params[0].amplitude)||75;
    g.append('text').attr('x',0).attr('y',-8).style('font','9px monospace').style('fill','#6e7681')
      .text('impulse: '+paramName+' (amplitude='+amplitude+', duty_cycle='+(dutyCycle*100).toFixed(0)+'%)');
    // Shade impulse trials
    trials.forEach((t,i)=>{
      const wm=t.user_attrs&&t.user_attrs.watermark;
      if(isActiveImpulse(t)){
        const tx=x(allTimes[i]);
        g.append('rect').attr('x',tx-2).attr('y',0).attr('width',4).attr('height',height)
          .attr('fill','rgba(240,136,62,0.15)').style('pointer-events','none');
      }
    });
  }

  const lineQ=useRaw?objValues:perObjQ;
  const line=d3.line().x((d,i)=>x(d.time)).y(d=>y(d.q)).defined(d=>d.q!=null&&isFinite(d.q));
  const pts=lineQ.map((q,i)=>({q,time:allTimes[i]}));
  g.append('path').datum(pts).attr('d',line)
    .attr('fill','none').attr('stroke','#58a6ff').attr('stroke-width',1.5).attr('opacity',0.8);

  const tObjNames=breeder.config?breeder.config.objectives.map(o=>o.name):[];
  trials.forEach((t,i)=>{
    const q=lineQ[i];
    if(q==null||!isFinite(q)||allTimes[i]==null) return;
    const wm=t.user_attrs&&t.user_attrs.watermark;
    const wmInfo=wmMeta?JSON.parse(wmMeta.user_attrs.watermark):{};
    const wmPeriod=wmInfo.period||20;
    const isOff=!wm||wm==='off';
    const wmIdx=t.user_attrs&&t.user_attrs.watermark_trial_idx;
    let dotColor;
    if((wmType==='sinusoidal'||wmType==='impulse')&&wmIdx!=null){
      if(wmType==='impulse'){
        // Impulse: orange for active probes, blue for free
        dotColor=isOff?'#58a6ff':'#f0883e';
      } else {
        const sinVal=Math.sin(2*Math.PI*wmIdx/(wmMeta?JSON.parse(wmMeta.user_attrs.watermark).period||20:20));
        dotColor=sinVal>0.3?'#3fb950':sinVal<-0.3?'#58a6ff':'#8b949e';
      }
    } else {
      dotColor=isOff?'#58a6ff':'#3fb950';
    }
    g.append('circle').attr('cx',x(allTimes[i])).attr('cy',y(q))
      .attr('r',2.5).attr('fill',dotColor).attr('opacity',0.6)
      .style('cursor','pointer')
      .on('mouseenter',function(event){
        d3.select(this).attr('r',5).attr('opacity',1);
        let html='<b>'+breeder.name+'</b> #'+(i+1);
        if(t.datetime_start) html+=' ('+t.datetime_start.substring(11,19)+')';
        const curObjName=tObjNames[objIdx]||'quality';
        html+='<br>'+curObjName+': '+(useRaw?q.toFixed(3):(q*100).toFixed(1)+'%');
        if(wmType==='on_off'){
          if(!isOff) html+='<br><span style="color:#f0883e">impulse probe</span>';
          else html+='<br><span style="color:#58a6ff">free trial</span>';
        } else if((wmType==='sinusoidal'||wmType==='impulse')){
          if(wmType==='impulse'){
            html+='<br><span style="color:#f0883e">impulse probe</span>';
          } else {
            html+='<br><span style="color:#6e7681">watermark pattern</span>';
          }
        }
        const tObjNames=breederConfig?breederConfig.objectives.map(o=>o.name):[];
        if(t.values) t.values.forEach((v,vi)=>{
          html+='<br>'+(tObjNames[vi]||('obj'+vi))+': '+(v!=null?v.toFixed(3):'\u2014');
        });
        showTip(html,event.clientX,event.clientY);
      })
      .on('mouseleave',function(){d3.select(this).attr('r',2.5).attr('opacity',0.6);hideTip()});
  });

  g.append('g').attr('transform','translate(0,'+height+')')
    .call(d3.axisBottom(x).ticks(6).tickFormat(d=>{
      if(breeder.times){
        const dt=new Date(d*1000);
        return dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0');
      }
      return '#'+(d+1);
    }))
    .selectAll('text').attr('fill','#484f58').style('font','8px monospace');
  g.selectAll('.domain').attr('stroke','#21262d');
  g.selectAll('.tick line').attr('stroke','#21262d');
  g.append('g').call(d3.axisLeft(y).ticks(4).tickFormat(useRaw?d3.format('.1f'):d3.format('.0%')))
    .selectAll('text').attr('fill','#8b949e').style('font','8px monospace');

  const legend=parent.append('div').attr('class','legend').style('margin-top','4px');
  if((wmType==='sinusoidal'||wmType==='impulse')){
    if(wmType==='impulse'){
      legend.append('span').html('<div class="dot" style="background:#f0883e"></div>impulse probe');
      legend.append('span').html('<div class="dot" style="background:#58a6ff"></div>free trial');
    } else {
      legend.append('span').html('<div class="dot" style="background:#3fb950"></div>impulse probe');
      legend.append('span').html('<div class="dot" style="background:#58a6ff"></div>free trial');
    }
    legend.append('span').html('<div class="dot" style="background:#8b949e"></div>inactive');
  } else {
    legend.append('span').html('<div class="dot" style="background:#f0883e"></div>impulse probe');
    legend.append('span').html('<div class="dot" style="background:#58a6ff"></div>free trial');
  }
}

function drawImpulseStack(container,perObjective){
  visPanelStyle(container);
  visPanelTitle(container,'Impulse Stacking — Stacked vs Baseline');
  if(!perObjective||!perObjective.length){container.append('div').style('color','#6e7681').style('font','10px monospace').text('no per-objective data');return;}
  var w=Math.min(900,window.innerWidth-80);
  var m={top:30,right:20,bottom:35,left:60};
  var cw=w-m.left-m.right;
  var objCount=perObjective.length;
  var ch=160;
  var svg=container.append('svg').attr('width',w).attr('height',ch+m.top+m.bottom);
  var g=svg.append('g').attr('transform','translate('+m.left+','+m.top+')');
  var objNames=['growth_rate','energy','water'];
  // Grouped bar chart: baseline_mean vs stacked_mean per objective
  var allVals=perObjective.map(function(o){return o.stacked_mean||0}).concat(perObjective.map(function(o){return o.baseline_mean||0}));
  var yMin=d3.min(allVals)*0.9;
  var yMax=d3.max(allVals)*1.1;
  var y=d3.scaleLinear().domain([yMin,yMax]).range([ch,0]);
  var x=d3.scaleBand().domain(perObjective.map(function(o){return 'obj '+o.objective_index})).range([0,cw]).padding(0.3);
  var x1=d3.scaleBand().domain(['baseline','stacked']).range([0,x.bandwidth()]).padding(0.1);
  g.append('g').attr('transform','translate(0,'+ch+')').call(d3.axisBottom(x))
    .selectAll('text').attr('fill','#6e7681').style('font','9px monospace');
  g.append('g').call(d3.axisLeft(y).ticks(5).tickFormat(d3.format('.3f')))
    .selectAll('text').attr('fill','#8b949e').style('font','8px monospace');
  g.selectAll('.domain').attr('stroke','#21262d');
  g.selectAll('.tick line').attr('stroke','#21262d');
  // Baseline bars
  perObjective.forEach(function(o){
    var gx=x('obj '+o.objective_index);
    g.append('rect').attr('x',gx+x1('baseline')).attr('width',x1.bandwidth())
      .attr('y',y(o.baseline_mean||0)).attr('height',ch-y(o.baseline_mean||0))
      .attr('fill','#484f58').attr('rx',2);
    // Stacked bars
    var det=o.detected;
    g.append('rect').attr('x',gx+x1('stacked')).attr('width',x1.bandwidth())
      .attr('y',y(o.stacked_mean||0)).attr('height',ch-y(o.stacked_mean||0))
      .attr('fill',det?'#3fb950':'#f85149').attr('rx',2);
    // SNR label
    g.append('text').attr('x',gx+x.bandwidth()/2).attr('y',-4)
      .style('font','bold 9px monospace').style('fill',det?'#3fb950':'#8b949e')
      .style('text-anchor','middle').text('SNR '+(o.snr||0).toFixed(1));
  });
  // Threshold line at SNR 2.5 (on the value axis — show as annotation)
  g.append('text').attr('x',cw).attr('y',-8).style('font','8px monospace')
    .style('fill','#58a6ff').style('text-anchor','end').text('threshold: SNR >= 2.5');
  // Legend
  var leg=g.append('g').attr('transform','translate('+(cw-200)+','+(ch+20)+')');
  leg.append('rect').attr('width',8).attr('height',8).attr('fill','#484f58').attr('rx',1);
  leg.append('text').attr('x',12).attr('y',8).style('font','8px monospace').style('fill','#6e7681').text('baseline');
  leg.append('rect').attr('x',70).attr('width',8).attr('height',8).attr('fill','#3fb950').attr('rx',1);
  leg.append('text').attr('x',82).attr('y',8).style('font','8px monospace').style('fill','#6e7681').text('stacked (post-impulse)');
}
